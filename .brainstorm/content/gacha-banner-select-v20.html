<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Лудка · играбельный макет · v20 · фикс стыков блеска</title>
<style>
  :root{
    --base:#08080f; --surface-2:#161623; --cyan:#00d4ff; --fg:#fff;
    --ink-2:rgba(255,255,255,.78); --ink-4:rgba(255,255,255,.36);
    --teal:#2dd4bf; --indigo:#818cf8; --orange:#fb923c; --rose:#fb7185;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--base);color:var(--fg);font-family:Inter,-apple-system,"Noto Sans",sans-serif;padding-top:64px;min-height:100vh}
  a{color:inherit;text-decoration:none;cursor:pointer}
  .wrap{max-width:80rem;margin:0 auto;padding:0 1rem}
  button{font-family:inherit}

  /* navbar */
  .glass-nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(0,0,0,.4);backdrop-filter:blur(24px)}
  .nav-inner{max-width:80rem;margin:0 auto;padding:0 1rem;height:64px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .brand{display:flex;align-items:center;gap:.5rem;font-weight:600;white-space:nowrap}
  .brand .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),#7c3aed);display:grid;place-items:center;font-size:.8rem}
  .nav-links{display:flex;gap:1.15rem;color:var(--ink-2);font-size:.9rem;font-weight:500}
  .nav-links .active{color:var(--cyan)}
  .nav-right{display:flex;align-items:center;gap:.7rem}
  .enigma-chip{display:flex;align-items:center;gap:.35rem;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.35);color:var(--cyan);border-radius:999px;padding:.25rem .7rem;font-size:.82rem;font-weight:600;white-space:nowrap}
  .avatar{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,#f472b6,#7c3aed);flex:none}
  .switcher{display:flex;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:3px;gap:2px}
  .switcher button{border:none;background:transparent;color:var(--ink-2);font-weight:600;font-size:.8rem;padding:.3rem .8rem;border-radius:999px;cursor:pointer}
  .switcher button.on{background:var(--cyan);color:#000}

  .page-head{display:flex;align-items:end;justify-content:space-between;gap:1rem;margin:1.6rem 0 1.1rem;flex-wrap:wrap}
  h1{font-size:1.6rem;font-weight:600}
  .daily{display:flex;align-items:center;gap:.9rem;background:rgba(22,22,35,.7);border:1px solid rgba(255,255,255,.1);border-radius:1rem;padding:.65rem 1rem}
  .daily .streak{font-size:.78rem;color:var(--ink-2)} .daily .streak b{color:var(--orange)}
  .btn{display:inline-flex;align-items:center;gap:.4rem;border-radius:.7rem;font-weight:600;cursor:pointer;border:none;font-size:.9rem;transition:.15s}
  .btn-primary{background:var(--cyan);color:#000;padding:.6rem 1.4rem}
  .btn-primary:hover{filter:brightness(1.12)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;filter:none}
  .btn-ghost{background:rgba(255,255,255,.08);color:#fff;padding:.6rem 1.1rem;border:1px solid rgba(255,255,255,.15)}
  .btn-ghost:hover{border-color:rgba(255,255,255,.4)}
  .btn-ghost:disabled{opacity:.4;cursor:not-allowed}
  .btn-sm{padding:.4rem .9rem;font-size:.82rem}
  .badge{font-size:.7rem;font-weight:600;padding:.18rem .55rem;border-radius:.4rem}
  .b-std{background:rgba(0,212,255,.18);color:var(--cyan)}
  .b-event{background:rgba(251,113,133,.18);color:var(--rose)}

  .art{position:absolute;inset:0;background-size:cover;background-position:center}
  .art.a1{background:linear-gradient(120deg,#0b3a55,#114b69 30%,#7c3aed)}
  .art.a2{background:linear-gradient(120deg,#551b3a,#8e2a55 45%,#fb7185)}
  .art.a3{background:linear-gradient(120deg,#1d4044,#0f766e 50%,#2dd4bf)}
  .art::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 75% 25%,rgba(255,255,255,.16),transparent 55%)}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,15,.1),rgba(8,8,15,.3) 55%,rgba(8,8,15,.92))}
  .char{position:absolute;right:7%;bottom:0;width:30%;max-width:330px;aspect-ratio:3/5;border-radius:1.2rem 1.2rem 0 0;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.05));display:grid;place-items:center;font-size:5rem}

  .arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:42px;height:42px;border-radius:999px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1.15rem;cursor:pointer;display:grid;place-items:center}
  .arrow:hover{border-color:var(--cyan);color:var(--cyan)}
  .arrow.l{left:.9rem}.arrow.r{right:.9rem}
  .dots{position:absolute;bottom:.9rem;left:50%;transform:translateX(-50%);display:flex;gap:.45rem;z-index:5}
  .dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.3);cursor:pointer;transition:.25s}
  .dot.on{width:22px;background:var(--cyan)}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity .45s;pointer-events:none}
  .slide.on{opacity:1;pointer-events:auto}
  .slide .meta{position:absolute;left:2rem;bottom:1.7rem;max-width:55%;z-index:4}
  .slide .meta h3{font-size:1.7rem;font-weight:600;margin:.4rem 0 .35rem}
  .slide .meta p{font-size:.9rem;color:var(--ink-2);margin-bottom:.95rem}

  .heroA{position:relative;height:380px;border-radius:1.25rem;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
  .rail{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:.6rem}
  .rail::-webkit-scrollbar{height:6px}.rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
  .cardB{position:relative;flex:0 0 360px;height:210px;border-radius:1rem;overflow:hidden;border:1px solid rgba(255,255,255,.1);scroll-snap-align:start;cursor:pointer;transition:transform .2s,border-color .2s}
  .cardB:hover{transform:translateY(-3px);border-color:rgba(0,212,255,.5)}
  .cardB .meta{position:absolute;left:1rem;bottom:.9rem;right:1rem}
  .cardB h3{font-size:1.05rem;font-weight:600;margin:.3rem 0 .1rem}
  .cardB p{font-size:.78rem;color:var(--ink-2)}

  .heroC{position:relative;height:clamp(380px,62vh,560px);border-radius:1.25rem 1.25rem 0 0;overflow:hidden;border:1px solid rgba(255,255,255,.1);border-bottom:none}
  .dock{border:1px solid rgba(255,255,255,.1);border-top:none;border-radius:0 0 1.25rem 1.25rem;background:rgba(22,22,35,.65);backdrop-filter:blur(12px);padding:1.1rem 1.5rem;display:flex;flex-wrap:wrap;align-items:center;gap:1.2rem;justify-content:space-between}
  .pity{flex:1;min-width:230px}
  .pity .bar{height:6px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:.45rem;overflow:hidden}
  .pity .fill{height:100%;background:linear-gradient(90deg,var(--cyan),#7c3aed);transition:width .4s}

  /* ── SPIN PAGE (A/B navigate here; shows the uploaded BACKDROP) ── */
  .spinpage{position:relative;border-radius:1.25rem;overflow:hidden;border:1px solid rgba(255,255,255,.1);min-height:430px}
  .backdrop{position:absolute;inset:-30px;background-size:cover;background-position:center;filter:blur(22px) brightness(.55);transform:scale(1.08)}
  .backdrop-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,15,.25),rgba(8,8,15,.78))}
  .spin-in{position:relative;z-index:2;padding:1.6rem 2rem 1.8rem;display:flex;flex-direction:column;gap:1.2rem;min-height:430px}
  .spin-top{display:flex;justify-content:space-between;align-items:start;gap:1rem;flex-wrap:wrap}
  .backlink{font-size:.82rem;color:var(--ink-2)} .backlink:hover{color:var(--cyan)}
  .spin-title h2{font-size:1.8rem;font-weight:600;margin:.35rem 0 .2rem}
  .spin-title p{color:var(--ink-2);font-size:.9rem;max-width:34rem}
  .spin-card{margin-top:auto;background:rgba(8,8,15,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);border-radius:1rem;padding:1.1rem 1.4rem;display:flex;flex-wrap:wrap;align-items:center;gap:1.2rem;justify-content:space-between}

  /* pool */
  .pool-h{display:flex;align-items:center;justify-content:space-between;margin:2.2rem 0 1rem}
  .pool-h h2{font-size:1.1rem;font-weight:600}
  .pool{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.9rem;margin-bottom:4rem}
  .pcard{border-radius:.9rem;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:var(--surface-2)}
  .pcard .img{aspect-ratio:3/4;display:grid;place-items:center;font-size:2.2rem}
  .pcard.unowned .img{filter:saturate(.45) brightness(.75)}
  .pcard.unowned{border-style:dashed;border-color:rgba(255,255,255,.18)}
  .pcard .nm{padding:.4rem .5rem .15rem;font-size:.74rem;font-weight:500;display:flex;justify-content:space-between;align-items:center;gap:.3rem}
  .pcard .st{padding:0 .5rem .45rem;display:block;font-size:.66rem;color:var(--ink-4)}
  .pcard .st.owned{color:var(--cyan)}
  .r-SSR{color:var(--orange)}.r-SR{color:var(--indigo)}.r-R{color:var(--teal)}.r-N{color:var(--ink-4)}

  /* ── RESULT MODAL ── */
  .overlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1.2rem}
  .overlay.on{display:flex}
  .result{background:var(--surface-2);border:1px solid rgba(255,255,255,.14);border-radius:1.25rem;max-width:46rem;width:100%;max-height:88vh;overflow-y:auto;padding:1.6rem}
  .result h3{font-weight:600;font-size:1.15rem;margin-bottom:.25rem}
  .result .sub{font-size:.8rem;color:var(--ink-2);margin-bottom:1.1rem}
  .rgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem;margin-bottom:1.3rem}
  @media(max-width:640px){.rgrid{grid-template-columns:repeat(3,1fr)}}
  .rcard{position:relative;border-radius:.9rem;overflow:hidden;border:2px solid;background:#101018;opacity:0;transform:translateY(14px) scale(.92);animation:pop .42s forwards}
  @keyframes pop{to{opacity:1;transform:none}}
  .rcard.f-SSR{border-color:var(--orange);box-shadow:0 0 18px rgba(251,146,60,.45)}
  .rcard.f-SR{border-color:var(--indigo);box-shadow:0 0 12px rgba(129,140,248,.35)}
  .rcard.f-R{border-color:var(--teal)}
  .rcard.f-N{border-color:rgba(255,255,255,.18)}
  .rcard .img{aspect-ratio:3/4;display:grid;place-items:center;font-size:2.1rem}
  .rcard .nm{padding:.35rem .45rem .5rem;font-size:.72rem;font-weight:500;display:flex;justify-content:space-between;gap:.2rem}
  .tagNEW{position:absolute;top:.35rem;left:.35rem;background:var(--cyan);color:#000;font-size:.62rem;font-weight:600;border-radius:.35rem;padding:.08rem .35rem}
  .tagDUP{position:absolute;top:.35rem;right:.35rem;background:rgba(0,0,0,.66);backdrop-filter:blur(4px);color:var(--ink-2);font-size:.62rem;font-weight:600;border-radius:.35rem;padding:.08rem .35rem}
  .result-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem}
  .result-foot .bal{font-size:.85rem;color:var(--ink-2)} .result-foot .bal b{color:var(--cyan)}

  /* ── summon (pre-reveal) ── */
  .summon{position:fixed;inset:0;z-index:96;background:rgba(2,2,8,.93);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.6rem}
  .summon.on{display:flex}
  .sigil{position:relative;width:150px;height:210px;border-radius:1rem;background:linear-gradient(150deg,#1a1a2e,#10101c 60%);border:1px solid rgba(255,255,255,.2);display:grid;place-items:center;font-size:3rem;animation:breathe 1.1s ease-in-out infinite}
  .sigil::before{content:"◆";position:absolute;font-size:2.2rem;color:var(--tease,#00d4ff);text-shadow:0 0 22px var(--tease,#00d4ff);animation:spinPulse 1.1s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes spinPulse{0%,100%{opacity:.55;transform:scale(.92)}50%{opacity:1;transform:scale(1.18)}}
  .ring{position:absolute;width:150px;height:210px;border-radius:1rem;border:2px solid var(--tease,#00d4ff);animation:ringOut 1.1s ease-out infinite;opacity:0}
  .ring.r2{animation-delay:.36s}.ring.r3{animation-delay:.72s}
  @keyframes ringOut{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.7);opacity:0}}
  /* гемма Энигмы: спираль частиц → заряд → трещины света → взрыв */
  .gemwrap{position:relative;width:300px;height:300px;display:grid;place-items:center}
  .gem{font-size:6.5rem;color:var(--tease,#00d4ff);text-shadow:0 0 34px var(--tease,#00d4ff),0 0 90px var(--tease,#00d4ff);animation:gemIdle 1.2s ease-in-out infinite;position:relative;z-index:2}
  @keyframes gemIdle{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .summon.charge .gem{animation:gemCharge .42s ease-in-out infinite}
  @keyframes gemCharge{0%,100%{transform:scale(1) rotate(-1.2deg)}50%{transform:scale(1.13) rotate(1.2deg)}}
  .summon.crack .gem{animation:gemShake .09s linear infinite}
  @keyframes gemShake{0%{transform:translate(-3px,1px)}25%{transform:translate(3px,-2px)}50%{transform:translate(-2px,-1px)}75%{transform:translate(2px,2px)}}
  .summon.burst .gem{animation:gemBurst .5s ease-out forwards}
  @keyframes gemBurst{0%{transform:scale(1.1);opacity:1;filter:blur(0)}100%{transform:scale(4.2);opacity:0;filter:blur(10px)}}
  .spark{position:absolute;left:50%;top:50%;width:7px;height:7px;margin:-3.5px;border-radius:50%;background:var(--tease,#00d4ff);box-shadow:0 0 10px var(--tease,#00d4ff);opacity:0;transform:rotate(var(--a)) translateX(190px) scale(.3);animation:suckIn var(--dur,1s) var(--del,0s) cubic-bezier(.5,0,.8,.4) infinite}
  @keyframes suckIn{0%{opacity:0;transform:rotate(var(--a)) translateX(190px) scale(.3)}25%{opacity:1}100%{opacity:0;transform:rotate(calc(var(--a) + 260deg)) translateX(4px) scale(1.15)}}
  .seam{position:absolute;left:50%;top:50%;width:3px;height:0;background:linear-gradient(#fff,var(--tease,#00d4ff));box-shadow:0 0 14px var(--tease,#00d4ff);transform-origin:top center;transform:translate(-50%,-50%) rotate(var(--sa));opacity:0;z-index:3}
  .summon.crack .seam,.summon.burst .seam{animation:seamGrow .3s ease-out forwards}
  @keyframes seamGrow{0%{height:0;opacity:0}40%{opacity:1}100%{height:130px;opacity:.95}}
  .summon .skip{font-size:.8rem;color:var(--ink-4);cursor:pointer;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:.35rem 1rem;background:none}
  .summon .skip:hover{color:#fff;border-color:rgba(255,255,255,.45)}
  .summon.gold{background:radial-gradient(ellipse at 50% 45%,rgba(124,45,18,.45),rgba(2,2,8,.96) 70%)}
  .summon.gold .sigil{animation:breathe .55s ease-in-out infinite}
  .flash{position:fixed;inset:0;z-index:97;background:#fff;opacity:0;pointer-events:none}
  .flash.go{animation:flashOut .5s ease-out}
  @keyframes flashOut{0%{opacity:.95}100%{opacity:0}}

  /* ── flip reveal in result grid ── */
  .rcard{perspective:600px}
  .rcard .flip{position:relative;width:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.3,1.4,.4,1)}
  .rcard.facedown .flip{transform:rotateY(180deg)}
  .face,.back{backface-visibility:hidden}
  .back{position:absolute;inset:0;transform:rotateY(180deg);background:linear-gradient(150deg,#1a1a2e,#10101c 60%);display:grid;place-items:center;font-size:1.8rem;color:rgba(0,212,255,.6)}
  .rcard.ssr-pop{opacity:1;transform:none;animation:ssrShake .5s .1s}
  @keyframes ssrShake{0%,100%{transform:none}25%{transform:translateX(-3px) rotate(-1.5deg)}75%{transform:translateX(3px) rotate(1.5deg)}}

  /* ── sequential 3D reveal ── */
  .viewer{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.4rem;touch-action:none;transition:background .6s ease;background:radial-gradient(ellipse at 50% 42%,var(--vglow,rgba(40,40,60,.5)),rgba(2,2,8,.96) 72%)}
  .viewer.t-N{--vglow:rgba(120,120,140,.28)}
  .viewer.t-R{--vglow:rgba(45,212,191,.3)}
  .viewer.t-SR{--vglow:rgba(129,140,248,.38)}
  .viewer.t-SSR{--vglow:rgba(251,146,60,.45)}
  .viewer::before{content:"";position:absolute;left:50%;top:42%;width:240vmax;height:240vmax;margin:-120vmax 0 0 -120vmax;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .5s;
    background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(255,255,255,.05) 0deg 6deg,transparent 6deg 14deg)}
  .viewer.t-SSR::before,.viewer.t-SR::before{opacity:1}
  .viewer.t-SSR::before{background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(251,146,60,.1) 0deg 6deg,transparent 6deg 14deg);animation:rays 14s linear infinite}
  @keyframes rays{to{transform:rotate(360deg)}}
  .viewer.on{display:flex}
  .stage{perspective:900px;position:relative}
  .card3d{position:relative;width:min(64vw,300px);aspect-ratio:3/4;border-radius:1.1rem;transform-style:preserve-3d;transition:transform .08s linear;cursor:grab;border:3px solid;background:#101018;animation:flyIn .8s cubic-bezier(.16,1,.3,1)}
  .card3d.slowIn{animation:flyIn 1.25s cubic-bezier(.16,1,.3,1)} /* SSR — медленнее, торжественнее */
  .card3d:active{cursor:grabbing}
  @keyframes flyIn{
    0%{transform:translateZ(-1100px) rotateY(900deg) scale(.25);opacity:0;filter:brightness(3) blur(6px)}
    55%{opacity:1;filter:brightness(1.6) blur(1px)}
    78%{transform:translateZ(46px) rotateY(-14deg) scale(1.05);filter:brightness(1.15) blur(0)}
    100%{transform:none;filter:none}}
  /* ударная волна при приземлении */
  .shock{position:absolute;left:50%;top:50%;width:20px;height:20px;margin:-10px;border-radius:50%;border:3px solid var(--tease,#00d4ff);opacity:0;pointer-events:none;animation:shock .6s ease-out forwards}
  .shock.s2{animation-delay:.12s;border-width:2px}
  @keyframes shock{0%{transform:scale(1);opacity:0}55%{opacity:.8}100%{transform:scale(22);opacity:0}}
  /* разлёт частиц */
  .pt{position:absolute;left:50%;top:50%;font-size:1rem;color:var(--tease,#00d4ff);text-shadow:0 0 10px var(--tease,#00d4ff);opacity:0;pointer-events:none;animation:ptFly .9s ease-out forwards}
  @keyframes ptFly{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}18%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.1) rotate(var(--rot));opacity:0}}
  .card3d.f-SSR{border-color:var(--orange);box-shadow:0 0 60px rgba(251,146,60,.55)}
  .card3d.f-SR{border-color:var(--indigo);box-shadow:0 0 34px rgba(129,140,248,.4)}
  .card3d.f-R{border-color:var(--teal);box-shadow:0 0 20px rgba(45,212,191,.3)}
  .card3d.f-N{border-color:rgba(255,255,255,.25)}
  .card3d .cimg{position:absolute;inset:0;border-radius:.9rem;display:grid;place-items:center;font-size:7rem;overflow:hidden}
  .card3d .holo{position:absolute;inset:0;border-radius:.9rem;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.28) 47%,rgba(0,212,255,.18) 52%,transparent 68%);background-size:240% 240%;background-position:var(--hx,50%) var(--hy,50%);mix-blend-mode:screen;pointer-events:none;background-repeat:no-repeat}
  .card3d .cname{position:absolute;left:0;right:0;bottom:0;padding:1.6rem .9rem .8rem;background:linear-gradient(transparent,rgba(0,0,0,.82));display:flex;justify-content:space-between;align-items:end;font-weight:600;border-radius:0 0 .85rem .85rem}
  .viewer .vcount{font-size:.82rem;color:var(--ink-4)}
  .viewer .vhint{font-size:.78rem;color:var(--ink-4)}
  .viewer .vbtns{display:flex;gap:.7rem}
  .vtagNEW{position:absolute;top:.6rem;left:.6rem;background:var(--cyan);color:#000;font-size:.75rem;font-weight:600;border-radius:.4rem;padding:.15rem .5rem}
  .vtagDUP{position:absolute;top:.6rem;right:.6rem;background:rgba(0,0,0,.66);color:var(--ink-2);font-size:.75rem;font-weight:600;border-radius:.4rem;padding:.15rem .5rem}
  .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:95;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,.4);color:#fff;font-size:.85rem;border-radius:.8rem;padding:.6rem 1.1rem;display:none}
  .toast.on{display:block}
  .variant{display:none}.variant.on{display:block}
  .hidden{display:none!important}
  @media(max-width:760px){.nav-links{display:none}.heroC{height:46vh;min-height:300px}.slide .meta{max-width:75%;left:1.1rem}.char{display:none}.spin-in{padding:1.1rem}}
</style>
</head>
<body>

<header class="glass-nav"><div class="nav-inner">
  <div class="brand"><div class="mark">🎴</div> AnimeEnigma</div>
  <nav class="nav-links"><a>Главная</a><a>Каталог</a><a>Расписание</a><a class="active">Лудка</a><a>Комнаты</a></nav>
  <div class="nav-right">
    <span class="enigma-chip">◆ <b id="bal">1240</b></span><div class="avatar"></div>
  </div>
</div></header>

<div class="wrap">
  <div class="page-head">
    <h1 id="pageTitle">Лудка</h1>
    <div class="daily" id="dailyCard">
      <div><div style="font-size:.84rem;font-weight:600">Ежедневный бонус</div>
        <div class="streak">Стрик: <b id="streakN">4 дня</b></div></div>
      <button class="btn btn-primary btn-sm" id="dailyBtn" onclick="claimDaily()">Получить ◆ 80</button>
    </div>
  </div>

  <!-- ═══ C: slider + dock (all-in-one) ═══ -->
  <div class="variant on" id="vC">
    <div class="heroC" id="heroC">
      <div class="slide on" id="slideC"><div class="art"></div><div class="scrim"></div><div class="char" id="charC"></div>
        <div class="meta" style="bottom:1.2rem"><span class="badge" id="badgeC"></span><h3 id="nameC" style="font-size:2.2rem;font-weight:600;margin-top:.4rem;text-shadow:0 2px 18px rgba(0,0,0,.5)"></h3></div></div>
      <button class="arrow l" onclick="goC(-1)">‹</button><button class="arrow r" onclick="goC(1)">›</button>
      <div class="dots" id="dotsC"></div>
    </div>
    <div class="dock">
      <div class="pity">
        <div style="display:flex;justify-content:space-between;font-size:.8rem"><span style="color:var(--ink-2)">До гаранта SSR</span><b id="pityC">—</b></div>
        <div class="bar"><div class="fill" id="fillC"></div></div>
      </div>
      <div style="display:flex;gap:.7rem;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="openDrops()" title="Какие карты выпадают из баннера">🃏 Выпадения</button>
        <button class="btn btn-ghost" onclick="doPull(curC,1,'C')">Крутить ×1 · <span style="color:var(--cyan)">◆ 100</span></button>
        <button class="btn btn-primary" onclick="doPull(curC,10,'C')">Крутить ×10 · ◆ 900</button>
      </div>
    </div>
  </div>

</div>

<!-- sequential 3D reveal viewer -->
<div class="viewer" id="viewer">
  <span class="vcount" id="vcount"></span>
  <div class="stage"><div class="card3d" id="card3d"></div></div>
  <span class="vhint">тяни мышью/пальцем — карта крутится в 3D</span>
  <div class="vbtns">
    <button class="btn btn-ghost btn-sm" onclick="endViewer()">Пропустить всё ››</button>
    <button class="btn btn-primary btn-sm" id="vnext" onclick="nextCard()">Дальше ›</button>
  </div>
</div>

<!-- summon (pre-reveal ceremony) -->
<div class="summon" id="summon">
  <div class="gemwrap" id="gemwrap">
    <div class="gem">◆</div>
  </div>
  <div id="summonHint" style="font-size:.85rem;color:var(--ink-2)">Призыв…</div>
  <button class="skip" onclick="skipSummon()">Пропустить ›</button>
</div>
<div class="flash" id="flash"></div>

<!-- drops modal: banner pool sorted by rarity, with tier rates -->
<div class="overlay" id="dropsOverlay" onclick="if(event.target===this)closeDrops()">
  <div class="result">
    <h3>Выпадения</h3>
    <div class="sub" id="dropsSub"></div>
    <div id="dropsBody"></div>
    <div class="result-foot" style="margin-top:1rem">
      <span class="bal" id="dropsStat"></span>
      <button class="btn btn-primary btn-sm" onclick="closeDrops()">Понятно</button>
    </div>
  </div>
</div>

<!-- result modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeResult()">
  <div class="result">
    <h3 id="resTitle">Результат крутки</h3>
    <div class="sub" id="resSub"></div>
    <div class="rgrid" id="rgrid"></div>
    <div class="result-foot">
      <span class="bal">Баланс: <b id="resBal"></b> ◆ · до гаранта SSR: <b id="resPity"></b></span>
      <div style="display:flex;gap:.6rem">
        <button class="btn btn-ghost btn-sm" id="againBtn">Ещё ×10 · ◆ 900</button>
        <button class="btn btn-primary btn-sm" onclick="closeResult()">Готово</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ════ shared demo state: balance, banners, pools, pity, collection ════ */
let balance=25000, dailyClaimed=false;
const RATE={N:69,R:22,SR:8,SSR:1}, PITY=90;
const BANNERS=[
 {id:'std',art:'a1',chr:'⚔️',name:'Вечный баннер',desc:'Все карточки коллекции. Без срока действия.',badge:'СТАНДАРТНЫЙ',std:true,pity:41,
  pool:[['Годжо','SSR','🧙','#3a2a55,#7c3aed'],['Сукуна','SSR','👹','#552a3a,#fb7185'],['Тодо','SR','🐆','#2a3a55,#818cf8'],['Нанами','SR','🧂','#1d4044,#2dd4bf'],['Мегуми','R','🐶','#223,#445'],['Нобара','R','🔨','#322,#655'],['Идзичи','N','👓','#222,#333'],['Мива','N','⚔','#223,#334']]},
 {id:'jjk',art:'a2',chr:'🌸',name:'Магическая битва',desc:'Годжо, Сукуна и компания — ивентовый дроп.',badge:'ИВЕНТ · до 24.06',std:false,pity:73,
  pool:[['Годжо','SSR','🧙','#3a2a55,#7c3aed'],['Сукуна','SSR','👹','#552a3a,#fb7185'],['Тодо','SR','🐆','#2a3a55,#818cf8'],['Мегуми','R','🐶','#223,#445'],['Нобара','R','🔨','#322,#655'],['Идзичи','N','👓','#222,#333']]},
 {id:'kny',art:'a3',chr:'🗡️',name:'Клинок',desc:'Летний дроп истребителей демонов.',badge:'ИВЕНТ · до 30.06',std:false,pity:12,
  pool:[['Ренгоку','SSR','🔥','#553a1b,#fb923c'],['Незуко','SR','🎍','#552a3a,#fb7185'],['Зеницу','SR','⚡','#554a1b,#eab308'.replace('#eab308','#fb923c')],['Иноске','R','🐗','#334,#667'],['Танджиро','R','🌊','#1d4044,#2dd4bf'],['Муракамо','N','🗡','#222,#333']]},
];
const owned={ 'std:Годжо':1,'std:Тодо':1,'std:Мегуми':1,'jjk:Годжо':1,'jjk:Тодо':1,'jjk:Мегуми':1 };
function fmt(n){return n.toLocaleString('ru-RU')}
function renderBal(){document.getElementById('bal').textContent=fmt(balance)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400)}
function claimDaily(){if(dailyClaimed)return;dailyClaimed=true;balance+=80;renderBal();
 const b=document.getElementById('dailyBtn');b.disabled=true;b.textContent='Получено ✓';
 document.getElementById('streakN').textContent='5 дней';toast('+80 ◆ · стрик 5 дней')}

/* ════ pull engine (same math as prod: weights, pity force, x10 SR floor) ════ */
function rollTier(b){
 if(b.pity+1>=PITY) return 'SSR';
 const r=Math.random()*100;let acc=0;
 for(const t of ['N','R','SR','SSR']){acc+=RATE[t];if(r<acc)return t}
 return 'N';
}
function pick(b,t){const c=b.pool.filter(x=>x[1]===t);return c.length?c[Math.floor(Math.random()*c.length)]:b.pool[b.pool.length-1]}
function doPull(b,n,ctx){
 const cost=n===10?900:100;
 if(balance<cost){toast('Не хватает Энигм: нужно ◆ '+cost);return}
 balance-=cost;
 const res=[];
 for(let i=0;i<n;i++){
   b.pity++;let t=rollTier(b);
   if(b.pity>=PITY)t='SSR';
   if(t==='SSR')b.pity=0;
   res.push(pick(b,t));
 }
 if(n===10&&!res.some(c=>c[1]==='SR'||c[1]==='SSR')){res[9]=pick(b,'SR')}
 const out=res.map(c=>{const k=b.id+':'+c[0];const was=owned[k]||0;owned[k]=was+1;return {c,isNew:was===0,cnt:was+1}});
 renderBal();renderAll();startCeremony(b,out,n,ctx);
}

/* ════ opening ceremony: summon → flash → face-down flip reveal ════ */
let ceremonyT=null,pending=null;
const TIER_RANK={N:0,R:1,SR:2,SSR:3};
const TEASE={N:'#9ca3af'.replace('#9ca3af','rgba(255,255,255,.55)'),R:'#2dd4bf',SR:'#818cf8',SSR:'#fb923c'};
function topTier(out){return out.reduce((m,o)=>TIER_RANK[o.c[1]]>TIER_RANK[m]?o.c[1]:m,'N')}
let ceremonyTimers=[];
function startCeremony(b,out,n,ctx){
 pending={b,out,n,ctx};
 const t=topTier(out);
 const sm=document.getElementById('summon');
 sm.style.setProperty('--tease',TEASE[t]);
 sm.className='summon on'+(t==='SSR'?' gold':'');
 document.getElementById('summonHint').textContent='Призыв…';
 // частицы-спирали (для SSR — гуще и дольше)
 const w=document.getElementById('gemwrap');
 w.querySelectorAll('.spark,.seam').forEach(e=>e.remove());
 const N=t==='SSR'?26:16;
 for(let i=0;i<N;i++){
   const d=document.createElement('div');d.className='spark';
   d.style.setProperty('--a',(360/N*i+Math.random()*20)+'deg');
   d.style.setProperty('--dur',(0.8+Math.random()*0.5)+'s');
   d.style.setProperty('--del',(Math.random()*0.6)+'s');
   w.appendChild(d);
 }
 // трещины (появятся в фазе crack)
 for(let i=0;i<7;i++){
   const d=document.createElement('div');d.className='seam';
   d.style.setProperty('--sa',(Math.random()*360)+'deg');
   d.style.animationDelay=(i*0.05)+'s';
   w.appendChild(d);
 }
 // фазы: заряд → треск → взрыв → карты
 const ssr=t==='SSR';
 const chargeAt=ssr?1200:700, crackAt=chargeAt+(ssr?900:500), burstAt=crackAt+450, doneAt=burstAt+420;
 ceremonyTimers.forEach(clearTimeout);ceremonyTimers=[
   setTimeout(()=>{sm.classList.add('charge');document.getElementById('summonHint').textContent=ssr?'…что-то сияет!':'Заряд…'},chargeAt),
   setTimeout(()=>{sm.classList.remove('charge');sm.classList.add('crack')},crackAt),
   setTimeout(()=>{sm.classList.remove('crack');sm.classList.add('burst')},burstAt),
   setTimeout(finishSummon,doneAt),
 ];
 ceremonyT=ceremonyTimers[3];
}
function skipSummon(){ceremonyTimers.forEach(clearTimeout);finishSummon(true)}
function finishSummon(skipped){
 const {b,out,n,ctx}=pending;
 document.getElementById('summon').classList.remove('on');
 const f=document.getElementById('flash');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');
 if(skipped===true){showResult(b,out,n,ctx,true);return}
 startViewer(b,out,n,ctx);
}

/* ════ sequential 3D viewer ════ */
let vIdx=0,vData=null;
function startViewer(b,out,n,ctx){
 vData={b,out,n,ctx};vIdx=0;
 document.getElementById('viewer').classList.add('on');
 renderCard3d();
}
function renderCard3d(){
 const {out}=vData;const o=out[vIdx];
 const c=document.getElementById('card3d');
 // ПРИНУДИТЕЛЬНЫЙ рестарт CSS-анимации: класс сам по себе не перезапускает
 // (анимация уже проигралась при загрузке страницы, пока viewer был скрыт).
 c.style.animation='none';
 void c.offsetWidth;                                  // зафиксировать "без анимации"
 c.className='card3d f-'+o.c[1]+(o.c[1]==='SSR'?' slowIn':'');
 c.style.animation='';                                // вернуть анимацию класса → старт с нуля
 const vw=document.getElementById('viewer');
 vw.className='viewer on t-'+o.c[1];
 spawnLandingFx(o.c[1]);
 c.style.transform='';
 c.innerHTML=`<div class="cimg" style="background:linear-gradient(160deg,${o.c[3]})">${o.c[2]}</div>
   <div class="holo"></div>
   <div class="cname"><span>${o.c[0]}</span><span class="r-${o.c[1]}">${o.c[1]}</span></div>
   ${o.isNew?'<span class="vtagNEW">NEW</span>':`<span class="vtagDUP">×${o.cnt}</span>`}`;
 document.getElementById('vcount').textContent=(vIdx+1)+' / '+out.length;
 document.getElementById('vnext').textContent=vIdx===out.length-1?'К результатам ›':'Дальше ›';
}
function nextCard(){
 if(vIdx>=vData.out.length-1){endViewer();return}
 vIdx++;renderCard3d();
}
function endViewer(){
 document.getElementById('viewer').classList.remove('on');
 const {b,out,n,ctx}=vData;
 showResult(b,out,n,ctx,true); // итоговая сетка, уже открытая
}
/* landing fx: shockwave rings + particle burst, tinted by rarity */
function spawnLandingFx(tier){
 const stage=document.querySelector('.stage');
 stage.querySelectorAll('.shock,.pt').forEach(e=>e.remove());
 const delay=tier==='SSR'?900:520; // момент "приземления" из flyIn
 setTimeout(()=>{
   const mk=cls=>{const d=document.createElement('div');d.className=cls;d.style.setProperty('--tease',TEASE[tier]);stage.appendChild(d);return d};
   mk('shock');mk('shock s2');
   const n=tier==='SSR'?14:tier==='SR'?10:7;
   for(let i=0;i<n;i++){
     const a=(Math.PI*2/n)*i+Math.random()*.5, r=90+Math.random()*120;
     const d=mk('pt');d.textContent=tier==='SSR'?'✦':'◆';
     d.style.setProperty('--dx',Math.cos(a)*r+'px');
     d.style.setProperty('--dy',Math.sin(a)*r+'px');
     d.style.setProperty('--rot',(Math.random()*240-120)+'deg');
     d.style.animationDelay=(Math.random()*.1)+'s';
   }
   setTimeout(()=>stage.querySelectorAll('.shock,.pt').forEach(e=>e.remove()),1100);
 },delay);
}

/* 3D tilt: drag (pointer) rotates; holo shine follows */
(function(){
 const c=document.getElementById('card3d');let drag=false,lx=0,ly=0,rx=0,ry=0;
 function apply(){c.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
   // позиция блика — через синус угла: периодична (полный оборот = полный цикл
   // блика) и никогда не выходит за пределы градиента → нет стыков тайлинга
   const hx=50-Math.sin(ry*Math.PI/180)*52, hy=50+Math.sin(rx*Math.PI/180)*52;
   c.style.setProperty('--hx',hx+'%');c.style.setProperty('--hy',hy+'%')}
 let raf=null;
 function tick(){apply();raf=drag?requestAnimationFrame(tick):null}
 c.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;c.setPointerCapture(e.pointerId);
   c.style.transition='none';            // во время драга — БЕЗ transition (он и давал дёрганье)
   if(!raf)raf=requestAnimationFrame(tick)});
 c.addEventListener('pointermove',e=>{
   if(drag){
     // вклад вертикали плавно затухает к 0 у ребра (90°) и меняет знак за ним —
     // непрерывно, без скачка, в отличие от жёсткой инверсии
     const k=Math.cos(ry*Math.PI/180);
     ry+=(e.clientX-lx)*.42; rx-=(e.clientY-ly)*.42*k;
     lx=e.clientX;ly=e.clientY;
     rx=Math.max(-32,Math.min(32,rx));   // apply() делает rAF-петля, не каждый move
   } else {const r=c.getBoundingClientRect();
     const px=(e.clientX-r.left)/r.width-.5, py=(e.clientY-r.top)/r.height-.5;
     ry=px*22; rx=-py*22; apply();}
 });
 function release(){if(!drag)return;drag=false;
   // плавный возврат: доворачиваем Y до ближайшего "лицом к нам" (кратно 360)
   c.style.transition='transform .5s cubic-bezier(.2,1.2,.4,1)';
   ry=Math.round(ry/360)*360; rx=0; apply();
   setTimeout(()=>{c.style.transition='transform .08s linear';ry=ry%360},520);
 }
 c.addEventListener('pointerup',release);
 c.addEventListener('pointercancel',release);
 c.addEventListener('pointerleave',()=>{if(!drag){rx=0;ry=0;apply()}});
 // переключение карт сбрасывает наклон
 new MutationObserver(()=>{rx=0;ry=0}).observe(c,{attributes:true,attributeFilter:['class']});
})();
function showResult(b,out,n,ctx,instant){
 const g=document.getElementById('rgrid');g.innerHTML='';
 // SSR flips LAST for suspense: sort flip order N→SSR, keep grid order as rolled
 const flipDelay=o=>instant?0:300+TIER_RANK[o.c[1]]*420+Math.random()*180;
 out.forEach((o,i)=>{
   const d=document.createElement('div');d.className='rcard f-'+o.c[1]+' facedown';d.style.animationDelay=(i*60)+'ms';
   d.innerHTML=`<div class="flip">
     <div class="face"><div class="img" style="background:linear-gradient(160deg,${o.c[3]})">${o.c[2]}</div>
       <div class="nm"><span>${o.c[0]}</span><span class="r-${o.c[1]}">${o.c[1]}</span></div></div>
     <div class="back">◆</div></div>
     ${o.isNew?'<span class="tagNEW" style="opacity:0">NEW</span>':`<span class="tagDUP" style="opacity:0">×${o.cnt}</span>`}`;
   g.appendChild(d);
   const reveal=()=>{if(!d.classList.contains('facedown'))return;
     d.classList.remove('facedown');
     if(o.c[1]==='SSR')d.classList.add('ssr-pop');
     const tag=d.querySelector('.tagNEW,.tagDUP');if(tag)setTimeout(()=>tag.style.opacity='1',300);}
   d.onclick=reveal;                     // нетерпеливые кликают сами
   setTimeout(reveal,flipDelay(o));      // иначе авто-флип: N/R быстро, SSR — последним
 });
 document.getElementById('resTitle').textContent=n===10?'Результат ×10':'Результат крутки';
 document.getElementById('resSub').textContent=b.name;
 document.getElementById('resBal').textContent=fmt(balance);
 document.getElementById('resPity').textContent=b.pity+' / '+PITY;
 const again=document.getElementById('againBtn');
 again.onclick=()=>{closeResult();doPull(b,10,ctx)};
 again.disabled=balance<900;
 document.getElementById('overlay').classList.add('on');
}
function closeResult(){document.getElementById('overlay').classList.remove('on')}

/* ════ pool rendering (for the banner in context) ════ */
let poolBanner=BANNERS[0];
function setPoolVisible(_v){/* pool section removed — drops modal replaces it */}
function renderPool(){/* replaced by drops modal */}

/* ════ variant C ════ */
let iC=1; // start on event banner
function C_cur(){return BANNERS[iC]}
let curC=BANNERS[1];
function renderC(){
 const dd=document.getElementById('dotsC');dd.innerHTML='';
 BANNERS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===iC?' on':'');d.onclick=()=>setC(i);dd.appendChild(d)});
 setC(iC);
}
function setC(i){
 iC=(i+BANNERS.length)%BANNERS.length;const b=BANNERS[iC];curC=b;
 document.querySelector('#slideC .art').className='art '+b.art;
 document.getElementById('charC').textContent=b.chr;
 document.getElementById('nameC').textContent=b.name;
 const bd=document.getElementById('badgeC');bd.textContent=b.badge;bd.className='badge '+(b.std?'b-std':'b-event');
 refreshCPity();
 [...document.getElementById('dotsC').children].forEach((d,k)=>d.classList.toggle('on',k===iC));
 poolBanner=b;renderPool()
}
function goC(d){setC(iC+d)}
function refreshCPity(){const b=BANNERS[iC];
 document.getElementById('pityC').textContent=b.pity+' / '+PITY;
 document.getElementById('fillC').style.width=Math.round(b.pity/PITY*100)+'%'}

/* ════ drops modal: pool grouped by rarity with tier rates ════ */
const TIER_ORDER=['SSR','SR','R','N'];
function openDrops(){
 const b=curC;
 document.getElementById('dropsSub').textContent=b.name;
 const body=document.getElementById('dropsBody');body.innerHTML='';
 let own=0,total=b.pool.length;
 TIER_ORDER.forEach(t=>{
   const cards=b.pool.filter(c=>c[1]===t);
   if(!cards.length)return;
   const h=document.createElement('div');
   h.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin:1rem 0 .55rem';
   h.innerHTML=`<span class="r-${t}" style="font-weight:600;font-size:.95rem">${t}</span>
     <span style="font-size:.75rem;color:var(--ink-4)">шанс тира: ${RATE[t]}%${t==='SSR'?' · гарант на 90-й':''}${t==='SR'?' · минимум 1 в ×10':''}</span>`;
   body.appendChild(h);
   const g=document.createElement('div');g.className='pool';g.style.marginBottom='0';
   cards.forEach(c=>{
     const k=b.id+':'+c[0];const cnt=owned[k]||0;if(cnt)own++;
     const d=document.createElement('div');d.className='pcard'+(cnt?'':' unowned');
     d.innerHTML=`<div class="img" style="background:linear-gradient(160deg,${c[3]})">${c[2]}</div>
       <div class="nm"><span>${c[0]}</span><span class="r-${c[1]}">${c[1]}</span></div>
       <span class="st ${cnt?'owned':''}">${cnt?('✓ выбито'+(cnt>1?' ×'+cnt:'')):'не выбито'}</span>`;
     g.appendChild(d);
   });
   body.appendChild(g);
 });
 document.getElementById('dropsStat').textContent='выбито '+own+' из '+total;
 document.getElementById('dropsOverlay').classList.add('on');
}
function closeDrops(){document.getElementById('dropsOverlay').classList.remove('on')}

/* refresh everything visible after a pull */
function renderAll(){
 renderPool();refreshCPity();
 }


renderC();renderBal();
</script>
</body>
</html>
