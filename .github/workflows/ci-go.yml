name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'libs/**'
      - 'worker/**'
      - 'scripts/go-modules.sh'
      - 'scripts/build-go.sh'
      - 'scripts/lint-go.sh'
      - 'scripts/test-go.sh'
      - 'go.work'
      - 'go.work.sum'
      - '.golangci.yml'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'libs/**'
      - 'worker/**'
      - 'scripts/go-modules.sh'
      - 'scripts/build-go.sh'
      - 'scripts/lint-go.sh'
      - 'scripts/test-go.sh'
      - 'go.work'
      - 'go.work.sum'
      - '.golangci.yml'
      - '.github/workflows/ci-go.yml'

env:
  GO_VERSION: '1.25.0'
  GOLANGCI_LINT_VERSION: 'v2.12'

jobs:
  lint:
    name: Lint all Go modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true

      - name: Run linters
        run: ./scripts/lint-go.sh

  test:
    name: Test all Go modules
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # fpcalc (libchromaprint-tools) lets content-verify's opskip.py
      # --selftest run its real-fpcalc rate guard — the regression test for
      # the fpcalc default -length 120 window-truncation bug. Without the
      # binary the selftest silently skips that guard and TestOpskipPySelftest
      # green means nothing for it.
      - name: Install fpcalc for the opskip selftest rate guard
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libchromaprint-tools python3-numpy

      - name: Run tests
        run: ./scripts/test-go.sh -cover -race
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  python:
    name: Test stealth scraper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/stealth-scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/stealth-scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build:
    name: Build all Go modules
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: ./scripts/build-go.sh
