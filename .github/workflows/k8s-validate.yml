name: K8s Validate

# Guards the kustomize deploy target (2026-06-21 audit follow-up):
#   - no placeholder credentials in committed manifests
#   - compose <-> kustomize service parity (the two deploy targets can't drift)
#   - the tree actually builds, and the output passes schema validation

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'docker/docker-compose.yml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'deploy/**'
      - 'docker/docker-compose.yml'
      - '.github/workflows/k8s-validate.yml'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: v5.4.3
      KUBECONFORM_VERSION: v0.6.7
    steps:
      - uses: actions/checkout@v4

      - name: Secret placeholder guard
        run: deploy/scripts/k8s-secret-guard.sh

      - name: Compose <-> kustomize parity
        run: deploy/scripts/k8s-compose-parity.sh

      - name: Install kustomize + kubeconform (pinned)
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" kustomize
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" kubeconform
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/kustomize" version
          "$RUNNER_TEMP/bin/kubeconform" -v

      - name: kustomize build (base)
        run: kustomize build deploy/kustomize/base -o "$RUNNER_TEMP/base.yaml"

      - name: kustomize build (prod overlay)
        run: |
          # secretGenerators reference git-ignored files (*.env, auth.htpasswd);
          # materialize dummies from the committed *.example templates so the build resolves.
          find deploy/kustomize/overlays/prod -name '*.example' -print | while read -r tmpl; do
            cp -v "$tmpl" "${tmpl%.example}"
          done
          kustomize build deploy/kustomize/overlays/prod -o "$RUNNER_TEMP/prod.yaml"

      - name: kubeconform (schema validation)
        run: |
          kubeconform -strict -ignore-missing-schemas -summary "$RUNNER_TEMP/base.yaml"
          kubeconform -strict -ignore-missing-schemas -summary "$RUNNER_TEMP/prod.yaml"
