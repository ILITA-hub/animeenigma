# OurEnglish (EN) Playability Canary — ISS-020 class regression detector
#
# Drives the REAL deployed site with the REAL bundled hls.js (NO CDN injection)
# to catch the ISS-020 failure mode: the bundled hls.js throwing a fatal
# bufferAddCodecError (or any decode failure) that freezes the EN player at
# 0:00 — something a server-side health probe CANNOT detect because it is a
# browser/MSE codec rejection.
#
# Spec: frontend/web/e2e/ourenglish-playability-canary.spec.ts
#
# FAIL semantics (the spec encodes these): alerts only when a provider the
# scraper /scraper/health endpoint reports playable:true fails to actually
# reach currentTime > 0 in-browser, OR when the default (auto) EN path fails.
# Providers down upstream (not reported playable) are soft-skipped, so the
# red signal stays meaningful.
#
# On failure, alerts admin via Telegram using TELEGRAM_BOT_TOKEN +
# TELEGRAM_ADMIN_CHAT_ID secrets (same secrets as the Kodik canary +
# player-health.yml).
#
# Cron is offset from the Kodik canary (7:13 UTC) and player-health (6:07 UTC)
# to avoid fleet contention on shared/self-hosted GitHub Actions runners —
# we run at 6:17 UTC.
name: OurEnglish Playability Canary

on:
  schedule:
    # Daily at 6:17 AM UTC (off-peak, non-:00; offset from player-health 6:07
    # and Kodik canary 7:13 to avoid runner fleet contention).
    - cron: '17 6 * * *'
  workflow_dispatch: # Allow manual on-demand canary runs

jobs:
  canary:
    name: OurEnglish Playability Canary
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: frontend/web

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers (chromium only)
        # The canary only needs chromium — and crucially it uses the REAL
        # bundled hls.js, so a single MSE-capable engine is the right signal.
        run: bunx playwright install --with-deps chromium

      - name: Run OurEnglish playability canary
        run: bunx playwright test e2e/ourenglish-playability-canary.spec.ts --project=chromium
        env:
          # Target production. Override here (or via workflow_dispatch + a
          # repo/env edit) to point at staging.
          CANARY_BASE_URL: https://animeenigma.ru
          # BASE_URL is what playwright.config.ts keys off to SKIP the local
          # `npm run dev` webServer (it only spins one up when BASE_URL is
          # unset). The spec itself uses CANARY_BASE_URL via test.use(); this
          # just suppresses the dev-server launch in CI. Keep them in sync.
          BASE_URL: https://animeenigma.ru

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ourenglish-canary-playwright-report
          path: frontend/web/playwright-report/
          retention-days: 7

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ourenglish-canary-test-results
          path: frontend/web/test-results/
          retention-days: 7

  notify:
    name: Telegram Alert
    runs-on: ubuntu-latest
    needs: canary
    if: failure()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          MESSAGE="🚨 *OurEnglish Playability Canary FAILED*

          The EN player did NOT reach real playback (currentTime > 0) for at least one provider the scraper health endpoint reports as playable — an ISS-020-class signal that the bundled hls.js may be freezing the player at 0:00.

          🔍 Debug recipe:
          1. Open https://animeenigma.ru/anime/dbc95dd5-8470-4f83-9632-622431073182 (TenSura S4).
          2. Click the in-page *EN* language pill, let the player resolve.
          3. Watch the timecode — if it sits at 0:00, open DevTools console and look for a fatal hls.js \`bufferAddCodecError\` (e.g. mp4a.40.1 on CODECS-less HLS).
          4. Per-provider: use the in-player *Source* dropdown to pin allanime (direct-MP4 control) and animepahe (HLS — the one ISS-020 broke).
          5. Fix: re-pin hls.js to \`~1.5.20\` (NOT caret) in frontend/web/package.json if a 1.6.x regression returned.

          🔗 [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          _Daily canary — $(date -u '+%Y-%m-%d %H:%M UTC')_"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true"
