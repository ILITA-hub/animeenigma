name: Player Health Check

on:
  schedule:
    # Daily at 6:07 AM UTC (offset from :00 to reduce fleet contention)
    - cron: '7 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    name: Player Health — ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project: [chrome, firefox, webkit]

    defaults:
      run:
        working-directory: frontend/web

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps ${{ matrix.project == 'chrome' && 'chromium' || matrix.project }}

      - name: Run player health checks
        run: bunx playwright test --config=playwright.health.config.ts --project=${{ matrix.project }}
        env:
          BASE_URL: https://animeenigma.ru

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ matrix.project }}
          path: frontend/web/health-report/
          retention-days: 7

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-results-${{ matrix.project }}
          path: frontend/web/health-results.json
          retention-days: 7

  notify:
    name: Telegram Alert
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          FAILED_BROWSERS=""
          # Check which browsers failed from the matrix
          for browser in chrome firefox webkit; do
            # needs.health-check.result is 'failure' if any matrix job failed
            FAILED_BROWSERS="$FAILED_BROWSERS $browser"
          done

          MESSAGE="🚨 *Player Health Check Failed*

          Some players may be broken. Check the GitHub Actions run for details.

          🔗 [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          _Daily automated check — $(date -u '+%Y-%m-%d %H:%M UTC')_"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true"
