name: Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'libs/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'libs/**'

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec on services
        run: |
          EXIT_CODE=0
          for service in services/*/; do
            echo "::group::Scanning $service"
            cd "$service"
            gosec ./... 2>&1 || EXIT_CODE=1
            cd ../..
            echo "::endgroup::"
          done
          echo "::group::Scanning libs"
          for lib in libs/*/; do
            cd "$lib"
            gosec ./... 2>&1 || EXIT_CODE=1
            cd ../..
          done
          echo "::endgroup::"
          # Report findings but don't fail CI until triaged
          exit 0

  trivy:
    name: Container Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - catalog
          - streaming
          - player
          - rooms
          - scheduler
          - gateway
          - themes
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ${{ matrix.service }}:scan \
            -f services/${{ matrix.service }}/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
