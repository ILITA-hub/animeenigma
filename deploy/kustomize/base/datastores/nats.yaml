# NATS — message bus with JetStream persistence. Mirrors docker-compose.yml
# service `nats` (nats:2.10-alpine, `--jetstream --store_dir=/data
# --http_port=8222`, nats_data volume, /healthz monitoring check).
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: animeenigma
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
---
# Headless governing Service for the StatefulSet (stable pod DNS identity).
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: animeenigma
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: animeenigma
spec:
  serviceName: nats-headless
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # compose `command` = nats-server flags (JetStream on, persistent
          # store on the data volume, HTTP monitoring on 8222).
          args: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitoring
              containerPort: 8222
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
