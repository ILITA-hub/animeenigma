# anidle guessing game service (spec 2026-06-15) — port 8095.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anidle
  namespace: animeenigma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anidle
  template:
    metadata:
      labels:
        app: anidle
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8095"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: anidle
          image: ghcr.io/ilita-hub/animeenigma/anidle:latest
          ports:
            - containerPort: 8095
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8095"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
            - name: CATALOG_URL
              value: "http://catalog:8081"
          livenessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: anidle
  namespace: animeenigma
spec:
  selector:
    app: anidle
  ports:
    - port: 8095
      targetPort: 8095
