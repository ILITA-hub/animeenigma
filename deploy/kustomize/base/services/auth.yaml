apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: animeenigma
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: auth
          image: ghcr.io/ilita-hub/animeenigma/auth:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
            # Telegram OIDC login — an absent/empty key disables the "Continue
            # with Telegram" flow (dark-ship safe). TELEGRAM_OIDC_REDIRECT_URL /
            # TELEGRAM_OIDC_ISSUER use code-defaulted values; not overridden here.
            - name: TELEGRAM_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: telegram-oidc-client-id
                  optional: true
            - name: TELEGRAM_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: telegram-oidc-client-secret
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: animeenigma
spec:
  selector:
    app: auth
  ports:
    - port: 8080
      targetPort: 8080
