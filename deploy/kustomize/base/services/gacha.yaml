# gacha (Лудка) — «Энигмы» economy substrate on port 8093. Wallet +
# idempotent ledger; card art lives in the gacha-cards MinIO bucket.
# GACHA_ENABLED=false dark-ships the backend (credit endpoint no-ops).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gacha
  namespace: animeenigma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gacha
  template:
    metadata:
      labels:
        app: gacha
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8093"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gacha
          image: ghcr.io/ilita-hub/animeenigma/gacha:latest
          ports:
            - containerPort: 8093
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8093"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
            - name: GACHA_ENABLED
              value: "true"
            - name: GACHA_STARTER_BONUS
              value: "300"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: minio-secret-key
            # Card-art bucket (distinct from the shared MINIO_BUCKET in the configmap).
            - name: GACHA_MINIO_BUCKET
              value: "gacha-cards"
          livenessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: gacha
  namespace: animeenigma
spec:
  selector:
    app: gacha
  ports:
    - port: 8093
      targetPort: 8093
