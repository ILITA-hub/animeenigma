# Degradation governor (graceful-degradation Phase 2) — port 8100.
# Storage-free by design (no Postgres, no JWT): polls Prometheus recording
# rules, applies hysteresis, publishes Redis ae:degradation:level.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governor
  namespace: animeenigma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governor
  template:
    metadata:
      labels:
        app: governor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: governor
          image: ghcr.io/ilita-hub/animeenigma/governor:latest
          ports:
            - containerPort: 8100
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8100"
            - name: GOVERNOR_PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc:9090/prometheus"
            - name: GOVERNOR_ANALYTICS_URL
              value: "http://analytics:8092"
            - name: TRACING_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: governor
  namespace: animeenigma
spec:
  selector:
    app: governor
  ports:
    - port: 8100
      targetPort: 8100
