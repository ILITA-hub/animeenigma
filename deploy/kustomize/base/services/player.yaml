apiVersion: apps/v1
kind: Deployment
metadata:
  name: player
  namespace: animeenigma
spec:
  # replicas pinned to 1 + Recreate: player-reports PVC is RWO and report
  # files assume a single writer
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: player
  template:
    metadata:
      labels:
        app: player
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
    spec:
      # player-reports PVC must be writable by the non-root runtime user.
      securityContext:
        fsGroup: 65534
      containers:
        - name: player
          image: ghcr.io/ilita-hub/animeenigma/player:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            # User feedback / error reports (compose volume player_reports).
            # REPORTS_DIR defaults to /data/reports in the player config.
            - name: player-reports
              mountPath: /data/reports
      volumes:
        - name: player-reports
          persistentVolumeClaim:
            claimName: player-reports
---
apiVersion: v1
kind: Service
metadata:
  name: player
  namespace: animeenigma
spec:
  selector:
    app: player
  ports:
    - port: 8083
      targetPort: 8083
---
# User feedback / error reports + triage sidecar _status.json files
# (compose volume player_reports). ReadWriteOnce: with replicas > 1 the
# player pods must co-schedule on one node (or use an RWX storage class).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: player-reports
  namespace: animeenigma
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
