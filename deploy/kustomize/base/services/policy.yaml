apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy
  namespace: animeenigma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy
  template:
    metadata:
      labels:
        app: policy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8098"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: policy
          image: ghcr.io/ilita-hub/animeenigma/policy:latest
          ports:
            - containerPort: 8098
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8098"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
            - name: TRACING_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: 8098
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8098
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: policy
  namespace: animeenigma
spec:
  selector:
    app: policy
  ports:
    - port: 8098
      targetPort: 8098
