apiVersion: apps/v1
kind: Deployment
metadata:
  name: recs
  namespace: animeenigma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recs
  template:
    metadata:
      labels:
        app: recs
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8094"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: recs
          image: ghcr.io/ilita-hub/animeenigma/recs:latest
          ports:
            - containerPort: 8094
          envFrom:
            - configMapRef:
                name: animeenigma-config
          env:
            - name: SERVER_PORT
              value: "8094"
            - name: DB_NAME
              value: "animeenigma"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: animeenigma-secrets
                  key: jwt-secret
            # S6 combo-pin Shikimori /similar fallback.
            - name: CATALOG_URL
              value: "http://catalog:8081"
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: recs
  namespace: animeenigma
spec:
  selector:
    app: recs
  ports:
    - port: 8094
      targetPort: 8094
