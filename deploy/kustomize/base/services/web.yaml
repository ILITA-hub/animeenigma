apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/ilita-hub/animeenigma/web:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # NOTE: this image is stock Alpine nginx — the master process starts
          # as root to bind port 80 and then drops worker processes to the
          # `nginx` user (the standard nginx model). Forcing runAsNonRoot /
          # runAsUser:65534 made the master unable to bind :80 and write its
          # pid file, guaranteeing CrashLoopBackOff. We harden what we can
          # without an unprivileged-nginx image rebuild: no privilege
          # escalation and a read-only-friendly cap set. (Switching to
          # nginxinc/nginx-unprivileged on :8080 — also updating nginx.conf,
          # the Service targetPort and the compose port map — is the follow-up
          # if a fully non-root pod is required.)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - CHOWN
                - SETUID
                - SETGID
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: animeenigma.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
