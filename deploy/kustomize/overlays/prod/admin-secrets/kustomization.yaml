apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  # admin-basic-auth is referenced by NAME in the ingress auth-secret annotation,
  # which kustomize does not rewrite — hash suffix must stay off.
  disableNameSuffixHash: true
secretGenerator:
  - name: grafana-admin
    envs:
      - grafana.env
  - name: pgadmin-credentials
    envs:
      - pgadmin.env
  - name: admin-basic-auth
    files:
      - auth=auth.htpasswd
