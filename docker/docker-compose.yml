services:
  # =============================================================================
  # Infrastructure
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: animeenigma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: animeenigma
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: animeenigma-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: animeenigma-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: animeenigma-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: animeenigma-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterkey
      MEILI_ENV: development
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  megacloud-extractor:
    build:
      context: ./megacloud-extractor
      dockerfile: Dockerfile
    container_name: animeenigma-megacloud-extractor
    ports:
      - "127.0.0.1:3200:3200"
    environment:
      - PORT=3200
      - BROWSER_TIMEOUT=15000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Phase 27 / SCRAPER-HEAL-29..33 — stealth-Chromium sidecar that fronts the
  # animepahe upstream. The scraper service talks to this container over the
  # docker-compose network (no host port exposed). Hard ship-gate caps from
  # CONTEXT.md D5: 500 MB memory + 0.5 CPU. seccomp:unconfined is the
  # documented sandbox-bypass; cap_add SYS_ADMIN is intentionally NOT granted
  # (T-27-03-02). The two-layer /healthz probe (T-27-03-03) ensures Chromium
  # is actually alive before the scraper depends_on flips green.
  animepahe-resolver:
    build:
      context: ..
      dockerfile: services/animepahe-resolver/Dockerfile
    container_name: animeenigma-animepahe-resolver
    restart: unless-stopped
    init: true                  # SIGTERM cleanup for Chromium subprocesses
    shm_size: 256m              # paired with --disable-dev-shm-usage; Chrome still wants some shm
    security_opt:
      - seccomp:unconfined      # documented exception — Chrome's internal sandbox needs userns
    mem_limit: 500m             # HARD ship gate per CONTEXT.md D5 + T-27-03-01
    cpus: "0.5"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      # NOTE: the sidecar HARDCODES https://animepahe.pw in server.js + browser.js
      # (T-27-01-01 — not overridable via env). The line below is audit documentation
      # only; changing it does NOT change sidecar behavior.
      _HARDCODED_UPSTREAM: "https://animepahe.pw (see server.js:37, browser.js:31)"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scraper:
    build:
      context: ..
      dockerfile: services/scraper/Dockerfile
    container_name: animeenigma-scraper
    restart: unless-stopped
    environment:
      SERVER_PORT: 8088
      SERVER_HOST: 0.0.0.0
      MEGACLOUD_EXTRACTOR_URL: http://megacloud-extractor:3200
      # Phase 16 plan 05 additions — Redis cache for malsync/episodes/stream
      # and the AnimePahe base URL (env-controlled so domain rotation is
      # restart-not-rebuild per the Wave 1 16-01 connectivity finding).
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      # Phase 27 / SCRAPER-HEAL-31 — animepahe-resolver is the new transport
      # for animepahe (replaces direct upstream fetch). See
      # services/animepahe-resolver/.
      SCRAPER_ANIMEPAHE_RESOLVER_URL: http://animepahe-resolver:3000
      # Phase 19 — AnimeKai (gated). Flag is default-off in production.
      # See docker/.env.example and .planning/REQUIREMENTS.md SCRAPER-KAI-05.
      # Toggle live with: SCRAPER_ANIMEKAI_ENABLED=true docker compose up -d scraper
      SCRAPER_ANIMEKAI_ENABLED: ${SCRAPER_ANIMEKAI_ENABLED:-false}
      SCRAPER_ANIMEKAI_BASE_URL: ${SCRAPER_ANIMEKAI_BASE_URL:-https://anikai.to}
      # Global kill-switch: comma-separated list of provider names that should
      # NOT be registered with the orchestrator. Failover skips them with zero
      # per-request cost. Default disables gogoanime (anitaku.to migrated to
      # anineko.to — different platform, parser doesn't apply). Phase 27
      # (2026-05-19) revived animepahe via the stealth-Chromium sidecar at
      # services/animepahe-resolver/; animepahe is no longer in the default
      # degraded set. The env-override escape hatch is preserved — set
      # `SCRAPER_DEGRADED_PROVIDERS=gogoanime,animepahe` in `docker/.env` to
      # re-disable on outage (e.g. animepahe.pw goes dark or stealth pins
      # rot). Flip off by removing names + `docker compose restart scraper`
      # (no rebuild needed).
      SCRAPER_DEGRADED_PROVIDERS: ${SCRAPER_DEGRADED_PROVIDERS:-gogoanime}
    ports:
      - "127.0.0.1:8088:8088"
    depends_on:
      megacloud-extractor:
        condition: service_healthy
      animepahe-resolver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # =============================================================================
  # Monitoring & Admin
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: animeenigma-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/prometheus/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.4
    container_name: animeenigma-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3102:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: animeenigma-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  tempo-init:
    image: minio/mc:latest
    container_name: animeenigma-tempo-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/tempo &&
        echo "tempo bucket ready"
    restart: "no"

  tempo:
    image: grafana/tempo:2.4.1
    container_name: animeenigma-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo API (Grafana datasource target)
    depends_on:
      tempo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: animeenigma-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ../infra/otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317" # OTLP gRPC (services export here)
      - "127.0.0.1:4318:4318" # OTLP HTTP
    depends_on:
      tempo:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.3.3
    container_name: animeenigma-grafana
    restart: unless-stopped
    user: "0"
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -rf /etc/grafana/provisioning
        cp -a /etc/grafana/provisioning-tpl /etc/grafana/provisioning
        sed -i "s|WEBHOOKPASS_PLACEHOLDER|$$GRAFANA_WEBHOOK_PASS|g" /etc/grafana/provisioning/alerting/contactpoints.yml
        exec /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_DOMAIN: animeenigma.ru
      GF_SERVER_ROOT_URL: "https://animeenigma.ru/admin/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: "animeenigma.ru localhost:8000 localhost:3004"
      # UA-115 (2026-05-13): anonymous access closed; the Admin role + Main Org settings below are now no-ops
      # but kept for grep-ability of the prior config. Re-enabling requires a Tier-A risk review.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GRAFANA_WEBHOOK_PASS: ${GRAFANA_WEBHOOK_PASS:-}
    extra_hosts:
      - "host-gateway:host-gateway"
    ports:
      - "127.0.0.1:3004:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning-tpl:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../infra/grafana/dashboards:/var/lib/grafana/dashboards-infra:ro
      # v3.1 Phase 23 Plan 23-03 — alert rule source-of-truth (read-only).
      # The same rules are also inlined into ./grafana/provisioning/
      # alerting/rules.yml (Option A wiring); this mount lets future plans
      # switch to a second alerting provisioning provider that points at
      # /var/lib/grafana/alerts/infra/ without a docker-compose change.
      - ../infra/grafana/alerts:/var/lib/grafana/alerts/infra:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  backup:
    build: ./backup
    container_name: animeenigma-backup
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-animeenigma}
      S3_REGION: ${S3_REGION:-default}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BACKUP_CHAT_ID: ${TELEGRAM_BACKUP_CHAT_ID:-}
    restart: unless-stopped

  admin-nginx:
    image: nginx:alpine
    container_name: animeenigma-admin-nginx
    restart: unless-stopped
    ports:
      # Phase 16 — moved off 8088 to avoid collision with `scraper` service.
      # `8088` is reserved for scraper (see CLAUDE.md and `make health`).
      - "127.0.0.1:8089:80"
    volumes:
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - prometheus
      - grafana

  # =============================================================================
  # Backend Services
  # =============================================================================

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: animeenigma-gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: 8000
      AUTH_SERVICE_URL: http://auth:8080
      CATALOG_SERVICE_URL: http://catalog:8081
      STREAMING_SERVICE_URL: http://streaming:8082
      PLAYER_SERVICE_URL: http://player:8083
      ROOMS_SERVICE_URL: http://rooms:8084
      THEMES_SERVICE_URL: http://themes:8086
      LIBRARY_SERVICE_URL: http://library:8089
      NOTIFICATIONS_SERVICE_URL: http://notifications:8090
      WATCH_TOGETHER_SERVICE_URL: http://watch-together:8091
      ANALYTICS_SERVICE_URL: http://analytics:8092
      GRAFANA_SERVICE_URL: http://grafana:3000
      PROMETHEUS_SERVICE_URL: http://prometheus:9090
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: "http://localhost:3003,http://localhost:8000"
      SITE_URL: ${SITE_URL:-https://animeenigma.ru}
      DEV_MODE: "true"
      # Phase 11 / UX-24 — system-status banner. Default off; operators
      # flip ACTIVE=true + set MESSAGE to surface a thin red banner at
      # the top of Home until users dismiss it (per-incident
      # localStorage flag).
      SYSTEM_BANNER_ACTIVE: ${SYSTEM_BANNER_ACTIVE:-false}
      SYSTEM_BANNER_MESSAGE: ${SYSTEM_BANNER_MESSAGE:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
      - auth
      - catalog
      - themes
      - library
      - notifications
      - grafana
      - prometheus

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: animeenigma-auth
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: Lax
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  catalog:
    build:
      context: ..
      dockerfile: services/catalog/Dockerfile
    container_name: animeenigma-catalog
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      REDIS_HOST: redis
      SHIKIMORI_USER_AGENT: AnimeEnigma/1.0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # Catalog signs stream/subtitle URLs with the HLS provenance HMAC; the
      # streaming proxy verifies them. Both MUST resolve the SAME key, so this
      # mirrors streaming's STREAM_TOKEN_SECRET (same default literal) — without
      # it, loadProvenanceSecret falls back to JWT_SECRET here while streaming
      # uses STREAM_TOKEN_SECRET, and every token is rejected.
      STREAM_TOKEN_SECRET: ${STREAM_TOKEN_SECRET:-stream-secret-change-in-production}
      SCRAPER_API_URL: http://scraper:8088
      JIMAKU_API_KEY: ${JIMAKU_API_KEY:-}
      OPENSUBTITLES_API_KEY: ${OPENSUBTITLES_API_KEY:-}
      OPENSUBTITLES_USER_AGENT: ${OPENSUBTITLES_USER_AGENT:-AnimeEnigma/1.0}
      ANIMELIB_TOKEN: ${ANIMELIB_TOKEN:-}
      HANIME_EMAIL: ${HANIME_EMAIL:-}
      HANIME_PASSWORD: ${HANIME_PASSWORD:-}
      TELEGRAM_NEWS_CHANNEL: ${TELEGRAM_NEWS_CHANNEL:-animeenigmanews}
      PROMETHEUS_SERVICE_URL: http://prometheus:9090/prometheus
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      scraper:
        condition: service_started

  streaming:
    build:
      context: ..
      dockerfile: services/streaming/Dockerfile
    container_name: animeenigma-streaming
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: animeenigma
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      STREAM_TOKEN_SECRET: ${STREAM_TOKEN_SECRET:-stream-secret-change-in-production}
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  player:
    build:
      context: ..
      dockerfile: services/player/Dockerfile
    container_name: animeenigma-player
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_ALERTS_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      REPORTS_DIR: /data/reports
      MAINTENANCE_URL: http://host-gateway:8087
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - player_reports:/data/reports
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rooms:
    build:
      context: ..
      dockerfile: services/rooms/Dockerfile
    container_name: animeenigma-rooms
    restart: unless-stopped
    environment:
      SERVER_PORT: 8084
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: services/scheduler/Dockerfile
    container_name: animeenigma-scheduler
    restart: unless-stopped
    environment:
      SERVER_PORT: 8085
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      REDIS_HOST: redis
      SHIKIMORI_USER_AGENT: AnimeEnigma/1.0
      CATALOG_SERVICE_URL: http://catalog:8081
      SHIKIMORI_SYNC_CRON: "0 2 * * *"
      # Phase 23 — scraper playability canary
      SCRAPER_PLAYABILITY_CANARY_CRON: "0 3 * * *"
      SCRAPER_BASE_URL: http://scraper:8088
      CANARY_REPORT_DIR: /data/reports/canary-runs
    volumes:
      - player_reports:/data/reports
    ports:
      - "127.0.0.1:8085:8085"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      catalog:
        condition: service_started
      scraper:
        condition: service_started

  themes:
    build:
      context: ..
      dockerfile: services/themes/Dockerfile
    container_name: animeenigma-themes
    restart: unless-stopped
    environment:
      SERVER_PORT: 8086
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      postgres:
        condition: service_healthy

  # workstream notifications, v1.0 Phase 1 — Notifications service.
  # Scaffold + CRUD HTTP API + internal UPSERT producer endpoint + two
  # service-owned tables (user_notifications, parser_episode_snapshots) in
  # the shared `animeenigma` DB. Phase 2 adds the cron detector; Phase 3
  # adds the Vue frontend. See
  # .planning/workstreams/notifications/phases/01-notifications-foundation/
  #
  # NOTE: SPEC originally allocated port 8087, but the host-side maintenance
  # bot binary (services/maintenance/) was already bound to 8087 — same
  # blocker that pushed library to 8089. Notifications therefore uses 8090
  # (next free port after library:8089). The maintenance bot remains on 8087.
  notifications:
    build:
      context: ..
      dockerfile: services/notifications/Dockerfile
    container_name: animeenigma-notifications
    restart: unless-stopped
    environment:
      SERVER_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      REDIS_HOST: redis
      # Phase 2 detector reads catalog's /internal/anime/{id}/episodes.
      CATALOG_URL: http://catalog:8081
      # Phase 2 detector cron + cleanup + worker pool settings.
      # NOTIFICATIONS_DETECTOR_ENABLED=false disables the scheduler at
      # boot (D-RB-01 rollback toggle) — CRUD + producer endpoint still
      # work, just no cron-driven creates / cleanup.
      NOTIFICATIONS_DETECTOR_ENABLED: "true"
      NOTIFICATIONS_DETECTOR_CRON: "0 * * * *"
      NOTIFICATIONS_CLEANUP_CRON: "30 3 * * *"
      NOTIFICATIONS_RETENTION_DAYS: "30"
      NOTIFICATIONS_DETECTOR_WORKER_LIMIT: "5"
      NOTIFICATIONS_PARSER_TIMEOUT: "10s"
      NOTIFICATIONS_UNREAD_GAUGE_INTERVAL: "5m"
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      catalog:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # workstream watch-together, v1.0 Phase 1 — co-watch service on port 8091.
  # Redis-only state (no Postgres). REST endpoints for room lifecycle,
  # WebSocket /ws for sync/chat/reactions, drift detection engine.
  # See .planning/workstreams/watch-together/phases/01-backend-foundation/
  watch-together:
    build:
      context: ..
      dockerfile: services/watch-together/Dockerfile
    container_name: animeenigma-watch-together
    restart: unless-stopped
    environment:
      SERVER_PORT: 8091
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # WT-FOUND-02 — sliding TTL on Redis keys + 5min grace.
      WATCH_TOGETHER_ROOM_TTL: ${WATCH_TOGETHER_ROOM_TTL:-15m}
      WATCH_TOGETHER_GRACE_PERIOD: ${WATCH_TOGETHER_GRACE_PERIOD:-5m}
      # WT-NF-02 — capacity per room.
      WATCH_TOGETHER_MAX_MEMBERS: ${WATCH_TOGETHER_MAX_MEMBERS:-10}
      # Invite URLs in POST /rooms response. Defaults to production origin;
      # override for dev/staging via .env.
      WATCH_TOGETHER_PUBLIC_BASE_URL: ${WATCH_TOGETHER_PUBLIC_BASE_URL:-https://animeenigma.ru}
      # CORS / Origin allowlist gate. Set to true in dev if connecting from
      # a non-canonical origin. Production should leave this false.
      WATCH_TOGETHER_ALLOW_ALL_ORIGINS: ${WATCH_TOGETHER_ALLOW_ALL_ORIGINS:-false}
      # Additional WS Origin allowlist (CSV). Defaults cover both the dev
      # localhost frontend (`http://localhost:3003`) AND the gateway-facing
      # origin (`http://localhost:8000`). PublicBaseURL is allowed implicitly.
      WATCH_TOGETHER_ALLOWED_ORIGINS: ${WATCH_TOGETHER_ALLOWED_ORIGINS:-http://localhost:3003,http://localhost:8000}
    ports:
      - "127.0.0.1:8091:8091"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8091/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Clickstream analytics ingestion (Plan 1). Postgres-backed events +
  # identity stitching; ClickHouse consolidation deferred. Port 8092.
  analytics:
    build:
      context: ..
      dockerfile: services/analytics/Dockerfile
    container_name: animeenigma-analytics
    restart: unless-stopped
    environment:
      SERVER_PORT: 8092
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: animeenigma
      ANALYTICS_IP_SALT: ${ANALYTICS_IP_SALT:-change-me-in-production}
      ANALYTICS_RETENTION_DAYS: "90"
      ANALYTICS_PURGE_CRON: "17 3 * * *"
    ports:
      - "127.0.0.1:8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8092/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # workstream raw-jp / v0.2 — Library service. Pure scaffold in Phase 1
  # (health + metrics only); Phases 2-6 add BitTorrent ingest, ffmpeg
  # transcode, MinIO writer, admin UI, and the hybrid resolver.
  #
  # NOTE: SPEC originally allocated port 8087, but the host-side maintenance
  # bot binary (services/maintenance/) was already bound to 8087 — surfaced
  # at first redeploy. The library service therefore uses 8089 (next free
  # port after scraper:8088). All CLAUDE.md / .env.example references reflect
  # 8089. The maintenance bot remains on 8087; player + scheduler reach it
  # via MAINTENANCE_URL=http://host-gateway:8087 unchanged.
  library:
    build:
      context: ..
      dockerfile: services/library/Dockerfile
    container_name: animeenigma-library
    restart: unless-stopped
    environment:
      SERVER_PORT: 8089
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ${LIBRARY_DB_NAME:-library}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # Phase 04 (raw-jp / v0.2) — MinIO writer + ffmpeg encoder.
      LIBRARY_MINIO_ENDPOINT: minio:9000
      LIBRARY_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      LIBRARY_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LIBRARY_MINIO_BUCKET: ${LIBRARY_MINIO_BUCKET:-raw-library}
      LIBRARY_MINIO_USE_SSL: "false"
      LIBRARY_ENCODE_WORKERS: ${LIBRARY_ENCODE_WORKERS:-2}
      LIBRARY_ENCODE_TMPDIR: /tmp/encode
      LIBRARY_FFMPEG_BIN: /usr/bin/ffmpeg
      LIBRARY_FFPROBE_BIN: /usr/bin/ffprobe
      LIBRARY_ENCODE_MAX_BITRATE_KBPS: ${LIBRARY_ENCODE_MAX_BITRATE_KBPS:-5000}
    ports:
      - "127.0.0.1:8089:8089"
    volumes:
      - library_torrents:/data/torrents
      - library_minio_staging:/tmp/encode
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G

  # =============================================================================
  # Frontend
  # =============================================================================

  web:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_RAW_PROVIDER_ENABLED: "true"
    container_name: animeenigma-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nats_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:
  loki_data:
  player_reports:
  # workstream raw-jp / v0.2 — library service. Both transient by spec;
  # local driver is correct. library_torrents holds in-progress + completed
  # torrent payloads (LIB-03/04 in Phase 3); library_minio_staging is the
  # ffmpeg encode scratch dir before HLS segments land in MinIO (Phase 4).
  library_torrents:
  library_minio_staging:
  tempo_data:

networks:
  default:
    name: animeenigma-network
