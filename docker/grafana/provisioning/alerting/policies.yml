apiVersion: 1

policies:
  - orgId: 1
    receiver: maintenance-webhook
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # HostPressureSustained (warning tier, L>=1) re-notification cap: at most
      # once per 12h. Host pressure is a slow, self-actuated condition (the
      # Phase-3 governor sheds load autonomously), so a still-firing sustained
      # alert does not need the default 4h nag — one heads-up per half-day is
      # plenty. Scoped to THIS alert only via alertname match; HostPressureCritical
      # (L=2, genuine UX distress) deliberately keeps the default fast cadence.
      # Resolve->refire churn is held down at the source: the recalibrated
      # thresholds (9c3e7d00) keep baseline out of Elevated, and the rule's
      # for:15m means any re-fire needs another full 15m of genuine elevation.
      # (keep_firing_for would be the belt-and-suspenders anti-flap but Grafana
      # 10.3.3 file provisioning does not support it — revisit on Grafana 11.)
      # Same maintenance-webhook receiver; continue:false stops further matching
      # (this alert is never diagnostic-severity anyway).
      - receiver: maintenance-webhook
        object_matchers:
          - ["alertname", "=", "HostPressureSustained"]
        group_interval: 5m
        repeat_interval: 12h
        continue: false
      # Per-provider scraper/parser pagers are demoted to dashboard-only
      # (severity=diagnostic): they keep evaluating (panels + state history)
      # but route through the always-on mute timing so they never notify.
      # The roster-centric fleet rules (ProviderFleet*) cover the actionable
      # aggregate — and disabled providers are excluded from those by
      # construction (provider_state lifecycle gauge). See
      # docs/superpowers/plans/2026-06-30-roster-centric-alerting.md Task 6.
      - receiver: maintenance-webhook
        object_matchers:
          - ["severity", "=", "diagnostic"]
        mute_time_intervals:
          - always
        continue: false
