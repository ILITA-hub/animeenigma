apiVersion: 1

groups:
  - orgId: 1
    name: AnimeEnigma Alerts
    folder: AnimeEnigma
    interval: 1m
    rules:
      - uid: service-unreachable
        title: Service Unreachable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: lt
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is unreachable"
          description: "The service {{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes."

      - uid: high-error-rate
        title: High Error Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(http_requests_total{status=~"5.."}[30m])) by (service)
                / sum(rate(http_requests_total[30m])) by (service)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has >5% 5xx error rate for 30 minutes."

      - uid: parser-failure-rate
        title: Parser Failure Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(parser_requests_total{status="error"}[30m])) by (provider)
                / sum(rate(parser_requests_total[30m])) by (provider)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High parser failure rate for {{ $labels.provider }}"
          description: "Parser {{ $labels.provider }} has >50% error rate for 30 minutes."

      - uid: high-p95-latency
        title: High P95 Latency
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{path!~"/admin/.*",service!="streaming"}[30m])) by (service, le))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "Service {{ $labels.service }} P95 latency >2s for 30 minutes."

      - uid: hls-proxy-saturation
        title: HLS Proxy Saturation
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: proxy_active_connections / 50
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HLS proxy near capacity"
          description: "HLS proxy is at >80% capacity ({{ $value }} of 50 max connections) for 2 minutes."

      - uid: scheduler-sync-failure
        title: Scheduler Sync Failure
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: increase(scheduler_job_executions_total{status="error"}[25h])
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.exported_job }} failed"
          description: "Scheduler job {{ $labels.exported_job }} has had errors in the last 25 hours."

      - uid: scheduler-sync-stale
        title: Scheduler Sync Stale
        noDataState: Alerting
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job!~"calendar_sync|cleanup"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90000]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Scheduler job {{ $labels.exported_job }} hasn't run successfully"
          description: "Scheduler job {{ $labels.exported_job }} hasn't succeeded in over 25 hours."


      - uid: scheduler-calendar-sync-stale
        title: Scheduler Calendar Sync Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="calendar_sync"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Calendar sync hasn't run successfully"
          description: "The calendar_sync job hasn't succeeded in over 8 days (expected weekly on Mondays)."

      - uid: scheduler-cleanup-stale
        title: Scheduler Cleanup Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="cleanup"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Cleanup hasn't run successfully"
          description: "The cleanup job hasn't succeeded in over 8 days (expected weekly on Sundays)."

      - uid: player-unavailable
        title: Player Unavailable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: player_health_up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Player {{ $labels.player }} is DOWN"
          description: "Player {{ $labels.player }} has been unavailable for 30+ minutes. Check external API status."

      - uid: provider-health-stream-segment-down
        title: Scraper Provider Stream-Segment Down
        condition: C
        noDataState: OK
        execErrState: Error
        for: 15m
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: provider_health_up{stage="stream_segment"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Scraper provider {{ $labels.provider }} stream_segment DOWN"
          description: "Provider {{ $labels.provider }} cannot fetch the first HLS segment from the golden pool for 15+ min — likely upstream broken or selector drift. Check /api/admin/scraper/health."

  # ============================================================================
  # Scraper Self-Healing (v3.1) — Phase 23 Plan 23-03
  # ============================================================================
  # Source-of-truth: infra/grafana/alerts/scraper.yaml
  # KEEP IN SYNC: any edit here MUST also be reflected in that file (and vice
  # versa). The group below is a verbatim copy appended inline so Grafana's
  # existing single-file provisioning provider loads it without a second
  # provider entry. When v3.2+ migrates to multi-file provisioning, this
  # block can be deleted and infra/grafana/alerts/ mounted as a directory.
  - orgId: 1
    name: Scraper Self-Healing
    folder: AnimeEnigma
    interval: 1m
    rules:
      - uid: scraper-playability-regression
        title: ScraperPlayabilityRegression
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server, reason) (increase(playability_canary_runs_total{result="fail"}[25h]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
          component: scraper
        annotations:
          summary: 'Scraper canary fail: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }})'
          description: 'playability_canary_runs_total recorded a fail in the last 25h for provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}. Maintenance bot dispatch: Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable) per .claude/maintenance-prompt.md.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'

      - uid: scraper-ad-decoy-surge
        title: ScraperAdDecoySurge
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server) (rate(parser_ad_decoy_total[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: warning
          component: scraper
          reason: ad_decoy
        annotations:
          summary: 'Scraper ad-decoy surge: {{ $labels.provider }} / {{ $labels.server }}'
          description: 'parser_ad_decoy_total rate has been > 0 for 5m on provider={{ $labels.provider }}, server={{ $labels.server }}. Maintenance bot dispatch: Pattern 6 (VibePlayer ad-decoy poisoning) — server-priority reorder, WARP toggle, or mark-degraded.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: ad_decoy

      - uid: scraper-unplayable-spike
        title: ScraperUnplayableSpike
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum by (provider, server, reason) (rate(parser_unplayable_total[5m]))
                / on (provider) group_left
                sum by (provider) (rate(parser_requests_total{operation="get_stream", status="success"}[5m]) > 0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: critical
          component: scraper
        annotations:
          summary: 'Scraper unplayable spike: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }}) >5%'
          description: 'rate(parser_unplayable_total{provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}}) is >5% of rate(parser_requests_total{operation="get_stream"}) sustained 5m. Maintenance bot dispatch: match `reason` to Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable / signed_url_expired).'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'
