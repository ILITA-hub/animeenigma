apiVersion: 1

groups:
  - orgId: 1
    name: AnimeEnigma Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: service-unreachable
        title: Service Unreachable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: lt
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is unreachable"
          description: "The service {{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes."

      - uid: high-error-rate
        title: High Error Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(http_requests_total{status=~"5.."}[30m])) by (service)
                / sum(rate(http_requests_total[30m])) by (service)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has >5% 5xx error rate for 30 minutes."

      - uid: parser-failure-rate
        title: Parser Failure Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Traffic gate (same pattern as high-p95-latency): `and (denominator > 0)`
              # drops providers with zero traffic entirely from the result vector.
              # Degraded/disabled providers produce 0/0 = NaN which Grafana evaluates
              # as `true` against any threshold — gate removes that false-positive class.
              # noDataState: OK => zero-traffic providers correctly never alert.
              expr: |
                (
                  sum(rate(parser_requests_total{status="error"}[30m])) by (provider)
                  / sum(rate(parser_requests_total[30m])) by (provider)
                )
                and
                (sum(rate(parser_requests_total[30m])) by (provider) > 0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High parser failure rate for {{ $labels.provider }}"
          description: "Parser {{ $labels.provider }} has >50% error rate for 30 minutes."

      - uid: high-p95-latency
        title: High P95 Latency
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # AUTO-361 family: gate P95 on a minimum request rate so idle/low-traffic
              # services (themes, library, auth) don't fire on a single GC/bcrypt blip.
              # `> 0.1 req/s` over 30m ≈ ≥180 requests — enough for a meaningful P95.
              # The `and` drops below-threshold services from the result vector entirely
              # (noDataState: OK → correctly non-firing).
              expr: |
                histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{path!~"/admin/.*",service!="streaming"}[30m])) by (service, le))
                  and
                (sum(rate(http_request_duration_seconds_count{path!~"/admin/.*",service!="streaming"}[30m])) by (service) > 0.1)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "Service {{ $labels.service }} P95 latency >2s for 30 minutes."

      - uid: hls-proxy-saturation
        title: HLS Proxy Saturation
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: proxy_active_connections / 50
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HLS proxy near capacity"
          description: "HLS proxy is at >80% capacity ({{ $value }} of 50 max connections) for 2 minutes."

      - uid: scheduler-sync-failure
        title: Scheduler Sync Failure
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: increase(scheduler_job_executions_total{status="error"}[25h])
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.exported_job }} failed"
          description: "Scheduler job {{ $labels.exported_job }} has had errors in the last 25 hours."

      - uid: scheduler-sync-stale
        title: Scheduler Sync Stale
        noDataState: Alerting
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job!~"calendar_sync|cleanup"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90000]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Scheduler job {{ if $labels.exported_job }}{{ $labels.exported_job }}{{ else }}(no-data — overnight jobs not yet run){{ end }} hasn't run successfully"
          description: "Scheduler job {{ if $labels.exported_job }}{{ $labels.exported_job }}{{ else }}(no-data — overnight jobs not yet run){{ end }} hasn't succeeded in over 25 hours."


      - uid: scheduler-calendar-sync-stale
        title: Scheduler Calendar Sync Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="calendar_sync"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Calendar sync hasn't run successfully"
          description: "The calendar_sync job hasn't succeeded in over 8 days (expected weekly on Mondays)."

      - uid: scheduler-cleanup-stale
        title: Scheduler Cleanup Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="cleanup"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Cleanup hasn't run successfully"
          description: "The cleanup job hasn't succeeded in over 8 days (expected weekly on Sundays)."

      - uid: player-unavailable
        title: Kodik Player Unavailable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: provider_health_up{provider="kodik"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Kodik player ({{ $labels.provider }}) is DOWN"
          description: "Kodik has been unavailable for 30+ minutes. Check Kodik API status."

      - uid: provider-health-stream-segment-down
        title: Scraper Provider Stream-Segment Down
        condition: C
        noDataState: OK
        execErrState: Error
        # AUTO-125: extended to 4h to absorb intermittent fetch failures
        # (stale ctk tokens, signed-URL expiry, transient CDN 5xx) that
        # are absorbed by the orchestrator's own provider-failover loop
        # and therefore do not surface to users. The probe now fetches
        # via the local HLS proxy (probe.go fetchSegment), which closes
        # the systematic false-positive class where direct CDN access
        # was Referer/geo-blocked but real user playback worked. What
        # remains is genuinely intermittent — a 4h `for:` smooths it.
        for: 4h
        data:
          # AUTO-125: alert only when BOTH `stream` and `stream_segment`
          # are DOWN for the same provider. If `stream` is up but
          # `stream_segment` is flapping, the orchestrator's fallback
          # absorbs the issue (verified: ~8 fallbacks/day to miruro
          # during the 2026-05-21 incident, zero user reports). A real
          # provider outage trips both stages.
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by (provider) (provider_health_up{stage=~"stream|stream_segment"})
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Scraper provider {{ $labels.provider }} stream_segment + stream DOWN"
          description: "Provider {{ $labels.provider }} has BOTH the stream and stream_segment stages DOWN for 4+ hours — likely real upstream outage or selector drift (orchestrator fallback can no longer mask). Check /api/admin/scraper/health and parser_zero_match_total/parser_ad_decoy_total."

      # AR-REPORT-03 (Phase 5 Plan 05-02): explainable avg+3σ volume-anomaly alert
      # on the ClickHouse datasource (NOT the Prometheus uid). Alert rules cannot read
      # dashboard template vars, so σ=3 / window=24h are hardcoded here; the
      # "Activity Register — Awareness Overview" dashboard panel keeps the tunable
      # $sigma/$window. Byte/volume baseline filters source='be' AND effect_kind='egress'.
      - uid: activity-register-volume-anomaly
        title: Activity Register Volume Anomaly
        condition: C
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              rawSql: |
                SELECT count() AS anomalies FROM (
                  WITH hourly AS (
                    SELECT operation, toStartOfHour(timestamp) AS h, sum(requests) AS req
                    FROM events
                    WHERE timestamp >= now() - INTERVAL 24 HOUR
                      AND effect_kind = 'egress' AND source = 'be'
                    GROUP BY operation, h
                  ),
                  stats AS (
                    SELECT operation,
                           avgIf(req, h < toStartOfHour(now())) AS baseline_avg,
                           stddevPopIf(req, h < toStartOfHour(now())) AS baseline_sd,
                           anyIf(req, h = toStartOfHour(now() - INTERVAL 1 HOUR)) AS last_req
                    FROM hourly GROUP BY operation
                  )
                  SELECT operation,
                         last_req > baseline_avg + 3 * baseline_sd AS is_anomaly
                  FROM stats WHERE baseline_avg > 0
                ) WHERE is_anomaly
              format: table
              queryType: sql
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 5m
        labels:
          severity: warning
          component: activity-register
        annotations:
          summary: "Volume anomaly: an operation is far above baseline"
          description: "An operation's last-hour request volume exceeded its 24h trailing avg+3σ baseline. Open the Activity Register — Awareness Overview dashboard."

  # ============================================================================
  # Scraper Self-Healing (v3.1) — Phase 23 Plan 23-03
  # ============================================================================
  # Source-of-truth: infra/grafana/alerts/scraper.yaml
  # KEEP IN SYNC: any edit here MUST also be reflected in that file (and vice
  # versa). The group below is a verbatim copy appended inline so Grafana's
  # existing single-file provisioning provider loads it without a second
  # provider entry. When v3.2+ migrates to multi-file provisioning, this
  # block can be deleted and infra/grafana/alerts/ mounted as a directory.
  - orgId: 1
    name: Scraper Self-Healing
    folder: Alerts
    interval: 1m
    rules:
      - uid: scraper-playability-regression
        title: ScraperPlayabilityRegression
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server, reason) (increase(playability_canary_runs_total{result="fail"}[25h]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
          component: scraper
        annotations:
          summary: 'Scraper canary fail: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }})'
          description: 'playability_canary_runs_total recorded a fail in the last 25h for provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}. Maintenance bot dispatch: Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable) per .claude/maintenance-prompt.md.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'

      - uid: scraper-ad-decoy-surge
        title: ScraperAdDecoySurge
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server) (rate(parser_ad_decoy_total[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: warning
          component: scraper
          reason: ad_decoy
        annotations:
          summary: 'Scraper ad-decoy surge: {{ $labels.provider }} / {{ $labels.server }}'
          description: 'parser_ad_decoy_total rate has been > 0 for 5m on provider={{ $labels.provider }}, server={{ $labels.server }}. Maintenance bot dispatch: Pattern 6 (VibePlayer ad-decoy poisoning) — server-priority reorder, WARP toggle, or mark-degraded.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: ad_decoy

      - uid: scraper-unplayable-spike
        title: ScraperUnplayableSpike
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum by (provider, server, reason) (rate(parser_unplayable_total[5m]))
                / on (provider) group_left
                sum by (provider) (rate(parser_requests_total{operation="get_stream", status="success"}[5m]) > 0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: critical
          component: scraper
        annotations:
          summary: 'Scraper unplayable spike: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }}) >5%'
          description: 'rate(parser_unplayable_total{provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}}) is >5% of rate(parser_requests_total{operation="get_stream"}) sustained 5m. Maintenance bot dispatch: match `reason` to Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable / signed_url_expired).'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'

  # ============================================================================
  # Anomaly Alerts — spec docs/superpowers/specs/2026-06-24-anomaly-alerts-design.md
  # ============================================================================
  # Source-of-truth: infra/grafana/alerts/anomaly.yaml
  # KEEP IN SYNC: any edit here MUST also be reflected in that file (and vice
  # versa). Verbatim copy appended inline so Grafana's single-file provisioning
  # provider loads it without a second provider entry.
  #
  # Two ClickHouse-datasource (aenigma-clickhouse) rules over analytics.events.
  # NB: provisioned CH alert queries use the NUMERIC `format: 1` (not the string
  # "table" dashboards use) — the backend plugin rejects a string format
  # (reference_grafana_clickhouse_format_enum). Validated via POST /api/ds/query.
  # Both route to maintenance-webhook; no provider/server triple => escalate.
  - orgId: 1
    name: Anomaly Alerts
    folder: Alerts
    interval: 5m
    rules:
      # EgressVolumeAnomaly (warning) — last complete hour > baseline + 3-sigma
      # AND > 500 MiB/h floor, per egress operation over a trailing 168h window.
      - uid: egress-volume-anomaly
        title: EgressVolumeAnomaly
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value FROM (
                  WITH hourly AS (
                    SELECT operation, toStartOfHour(timestamp) AS h, sum(bytes_out + bytes_in) AS b
                    FROM analytics.events
                    WHERE timestamp >= now() - INTERVAL 168 HOUR
                      AND effect_kind = 'egress' AND source = 'be'
                    GROUP BY operation, h),
                  stats AS (
                    SELECT operation,
                      avgIf(b,       h <  toStartOfHour(now()))                   AS baseline_avg,
                      stddevPopIf(b, h <  toStartOfHour(now()))                   AS baseline_sd,
                      anyIf(b,       h =  toStartOfHour(now() - INTERVAL 1 HOUR)) AS last_hour
                    FROM hourly GROUP BY operation)
                  SELECT operation FROM stats
                  WHERE baseline_avg > 0
                    AND last_hour > baseline_avg + 3 * baseline_sd
                    AND last_hour > 524288000)
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: streaming
          reason: egress_anomaly
        annotations:
          summary: 'Egress volume anomaly: {{ $values.B }} operation(s) over hourly baseline (>3σ, >500 MiB/h)'
          description: 'One or more egress operations sent abnormally high volume in the last complete hour (> baseline_avg + 3·σ over the trailing 168h, and > 500 MiB/h). Almost always the video HLS proxy. Open the "Activity Register — Overview" dashboard to see which operation and the volume vs baseline.'
          reason: egress_anomaly

      # ScraperStreamCascadeLatency (warning) — >=3 stream resolves >12s in 1h
      - uid: scraper-stream-cascade-latency
        title: ScraperStreamCascadeLatency
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM analytics.events
                WHERE operation = 'scraper GET /scraper/stream'
                  AND timestamp >= now() - INTERVAL 1 HOUR
                  AND duration_ms > 12000
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: scraper
          reason: stream_cascade_latency
        annotations:
          summary: 'Scraper stream cascade: {{ $values.B }} resolutions over 12s in the last hour'
          description: 'At least 3 `scraper GET /scraper/stream` resolutions exceeded 12 s in the last hour — a multi-provider failover cascade (normal is sub-second warm / 8 s single-gate). Check provider health (/api/anime/_/scraper/health), the Scraper dashboards, and recent parser_fallback_total.'
          reason: stream_cascade_latency

      - uid: provider-fleet-no-auto-playable
        title: ProviderFleetNoAutoPlayable
        condition: C
        noDataState: OK
        execErrState: Error
        for: 30m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Per group, fires when the HEALTHIEST provider is registered
              # (>=1, so all-Disabled steady-state groups are excluded) but below
              # auto-playable (<3 => no UP/Recovering). `max by (group)` never
              # yields an empty result, so a fully-Down group still produces a
              # value to threshold (the naive count(...>=3)==0 would vanish).
              expr: (max by (group) (provider_state) < 3) and (max by (group) (provider_state) >= 1)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Provider group {{ $labels.group }}: no auto-playable source"
          description: "Every provider in the {{ $labels.group }} group is Down or only manually-selectable (Degraded) for 30m — auto-failover cannot serve this group. Check /api/admin/scraper/health and the playback-health roster."

      - uid: provider-fleet-correlated-down
        title: ProviderFleetCorrelatedDown
        condition: C
        noDataState: OK
        execErrState: Error
        for: 30m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Count of providers per group actively failing IN the auto chain
              # (state==1 Down). Gradual attrition is auto-demoted to manual
              # (Degraded=2) and never counts here, so >=2 means a correlated
              # simultaneous failure (shared cause), not slow one-at-a-time aging.
              expr: count by (group) (provider_state == 1)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Provider group {{ $labels.group }}: multiple sources failed together"
          description: "2+ providers in the {{ $labels.group }} group are actively Down in the auto chain for 30m — a correlated outage (shared cause), not gradual degrade. Check the Camoufox pool / shared dependency and /api/admin/scraper/health."
