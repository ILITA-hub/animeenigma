apiVersion: 1

# Grafana file provisioning only ADDS and UPDATES rules — removing a rule from
# this file leaves it live in the DB (provenance=file) forever. Retiring a rule
# therefore takes two steps: delete its block below, AND list its uid here.
# Entries are idempotent: deleting an absent uid is a no-op, so they are safe to
# keep after the rule is gone.
deleteRules:
  # "Kodik Player Unavailable" — retired 2026-07-15. Queried
  # provider_health_up{provider="kodik"} after the roster row was renamed to
  # kodik-iframe, so it matched nothing and (noDataState: OK) could never fire.
  # RU is covered generically by the ProviderFleet* rules. See the note where
  # its block used to live, further down this file.
  - orgId: 1
    uid: player-unavailable
  # Constructor registry + DB engine_kind activation validation make the
  # former roster/code mismatch state structurally invalid.
  - orgId: 1
    uid: provider-row-unwired

groups:
  - orgId: 1
    name: AnimeEnigma Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: service-unreachable
        title: Service Unreachable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: lt
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is unreachable"
          description: "The service {{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes."

      - uid: high-error-rate
        title: High Error Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(http_requests_total{status=~"5.."}[30m])) by (service)
                / sum(rate(http_requests_total[30m])) by (service)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has >5% 5xx error rate for 30 minutes."

      - uid: parser-failure-rate
        title: Parser Failure Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Traffic gate (same pattern as high-p95-latency): `and (denominator > 0)`
              # drops providers with zero traffic entirely from the result vector.
              # Degraded/disabled providers produce 0/0 = NaN which Grafana evaluates
              # as `true` against any threshold — gate removes that false-positive class.
              # noDataState: OK => zero-traffic providers correctly never alert.
              expr: |
                (
                  sum(rate(parser_requests_total{status="error"}[30m])) by (provider)
                  / sum(rate(parser_requests_total[30m])) by (provider)
                )
                and
                (sum(rate(parser_requests_total[30m])) by (provider) > 0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: diagnostic
        annotations:
          summary: "High parser failure rate for {{ $labels.provider }}"
          description: "Parser {{ $labels.provider }} has >50% error rate for 30 minutes."

      - uid: high-p95-latency
        title: High P95 Latency
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # AUTO-361 family: gate P95 on a minimum request rate so idle/low-traffic
              # services (themes, library, auth) don't fire on a single GC/bcrypt blip.
              # `> 0.1 req/s` over 30m ≈ ≥180 requests — enough for a meaningful P95.
              # The `and` drops below-threshold services from the result vector entirely
              # (noDataState: OK → correctly non-firing).
              expr: |
                histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{path!~"/admin/.*",service!="streaming"}[30m])) by (service, le))
                  and
                (sum(rate(http_request_duration_seconds_count{path!~"/admin/.*",service!="streaming"}[30m])) by (service) > 0.1)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "Service {{ $labels.service }} P95 latency >2s for 30 minutes."

      - uid: hls-proxy-saturation
        title: HLS Proxy Saturation
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: proxy_active_connections / 50
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HLS proxy near capacity"
          description: "HLS proxy is at >80% capacity ({{ $value }} of 50 max connections) for 2 minutes."

      - uid: scheduler-sync-failure
        title: Scheduler Sync Failure
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: increase(scheduler_job_executions_total{status="error"}[25h])
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.exported_job }} failed"
          description: "Scheduler job {{ $labels.exported_job }} has had errors in the last 25 hours."

      # Restart hardening (AUTO-610/611): the last-success gauge is process
      # memory, so a scheduler redeploy used to open a no-data window that this
      # rule (noDataState: Alerting, for: 0s) paged P0 on within one eval. Two
      # layers close it: the scheduler now persists per-job timestamps and
      # re-seeds the gauge at startup (services/scheduler internal/service
      # SeedLastSuccess), and max_over_time[1h] below rides the remaining
      # scrape-gap during the restart itself. Genuine staleness is unaffected —
      # the gauge VALUE keeps aging regardless of the window — and sustained
      # no-data (scheduler exporting nothing for >1h) still alerts.
      - uid: scheduler-sync-stale
        title: Scheduler Sync Stale
        noDataState: Alerting
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - max_over_time(scheduler_job_last_success_timestamp{exported_job!~"calendar_sync|cleanup"}[1h])
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90000]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Scheduler job {{ if $labels.exported_job }}{{ $labels.exported_job }}{{ else }}(no-data — overnight jobs not yet run){{ end }} hasn't run successfully"
          description: "Scheduler job {{ if $labels.exported_job }}{{ $labels.exported_job }}{{ else }}(no-data — overnight jobs not yet run){{ end }} hasn't succeeded in over 25 hours."


      - uid: scheduler-calendar-sync-stale
        title: Scheduler Calendar Sync Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="calendar_sync"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Calendar sync hasn't run successfully"
          description: "The calendar_sync job hasn't succeeded in over 8 days (expected weekly on Mondays)."

      - uid: scheduler-cleanup-stale
        title: Scheduler Cleanup Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="cleanup"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Cleanup hasn't run successfully"
          description: "The cleanup job hasn't succeeded in over 8 days (expected weekly on Sundays)."

      # REMOVED 2026-07-15: `player-unavailable` ("Kodik Player Unavailable").
      # It queried provider_health_up{provider="kodik"}, but the roster row was
      # renamed to kodik-iframe — the selector matched nothing, and with
      # noDataState: OK the rule could never fire. It had been silently dead
      # since the rename. A hardcoded provider name cannot survive a DB-driven
      # roster, so it is not replaced: RU is covered generically by the
      # ProviderFleet* rules below, which read provider_health_state per
      # `group` and already see all five RU rows (kodik-iframe, kodik-noads,
      # animejoy-sibnet, animejoy-allvideo, animelib).

      - uid: provider-health-stream-segment-down
        title: Scraper Provider Stream-Segment Down
        condition: C
        noDataState: OK
        execErrState: Error
        # AUTO-125: extended to 4h to absorb intermittent fetch failures
        # (stale ctk tokens, signed-URL expiry, transient CDN 5xx) that
        # are absorbed by the orchestrator's own provider-failover loop
        # and therefore do not surface to users. The probe now fetches
        # via the local HLS proxy (probe.go fetchSegment), which closes
        # the systematic false-positive class where direct CDN access
        # was Referer/geo-blocked but real user playback worked. What
        # remains is genuinely intermittent — a 4h `for:` smooths it.
        for: 4h
        data:
          # AUTO-125: alert only when BOTH `stream` and `stream_segment`
          # are DOWN for the same provider. If `stream` is up but
          # `stream_segment` is flapping, the orchestrator's fallback
          # absorbs the issue (verified: ~8 fallbacks/day to miruro
          # during the 2026-05-21 incident, zero user reports). A real
          # provider outage trips both stages.
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by (provider) (provider_health_up{stage=~"stream|stream_segment"})
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: diagnostic
        annotations:
          summary: "Scraper provider {{ $labels.provider }} stream_segment + stream DOWN"
          description: "Provider {{ $labels.provider }} has BOTH the stream and stream_segment stages DOWN for 4+ hours — likely real upstream outage or selector drift (orchestrator fallback can no longer mask). Check /api/admin/scraper/health and parser_zero_match_total/parser_ad_decoy_total."

      # AR-REPORT-03 (Phase 5 Plan 05-02): explainable avg+3σ volume-anomaly alert
      # on the ClickHouse datasource (NOT the Prometheus uid). Alert rules cannot read
      # dashboard template vars, so σ=3 / window=24h are hardcoded here; the
      # "Activity Register — Awareness Overview" dashboard panel keeps the tunable
      # $sigma/$window. Byte/volume baseline filters source='be' AND effect_kind='egress'.
      # `last_req > 20` floor added 2026-07-24 (mirrors EgressVolumeAnomaly's 500MiB/h
      # floor): near-zero-traffic ops (health checks, internal probes, ~1-8 req/h) have
      # a tiny baseline_avg/stddev, so ordinary Poisson jitter trivially clears 3σ.
      # Fired on `catalog GET /health` (avg 2.69, last_req 8) with no real traffic change.
      - uid: activity-register-volume-anomaly
        title: Activity Register Volume Anomaly
        condition: C
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              rawSql: |
                SELECT count() AS anomalies FROM (
                  WITH hourly AS (
                    SELECT operation, toStartOfHour(timestamp) AS h, sum(requests) AS req
                    FROM events
                    WHERE timestamp >= now() - INTERVAL 24 HOUR
                      AND effect_kind = 'egress' AND source = 'be'
                    GROUP BY operation, h
                  ),
                  stats AS (
                    SELECT operation,
                           avgIf(req, h < toStartOfHour(now())) AS baseline_avg,
                           stddevPopIf(req, h < toStartOfHour(now())) AS baseline_sd,
                           anyIf(req, h = toStartOfHour(now() - INTERVAL 1 HOUR)) AS last_req
                    FROM hourly GROUP BY operation
                  )
                  SELECT operation,
                         last_req > baseline_avg + 3 * baseline_sd AS is_anomaly
                  FROM stats WHERE baseline_avg > 0 AND last_req > 20
                ) WHERE is_anomaly
              format: table
              queryType: sql
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        for: 5m
        labels:
          severity: warning
          component: activity-register
        annotations:
          summary: "Volume anomaly: an operation is far above baseline"
          description: "An operation's last-hour request volume exceeded its 24h trailing avg+3σ baseline. Open the Activity Register — Awareness Overview dashboard."

  # ============================================================================
  # Scraper Self-Healing (v3.1) — Phase 23 Plan 23-03
  # ============================================================================
  # Source-of-truth: infra/grafana/alerts/scraper.yaml
  # KEEP IN SYNC: any edit here MUST also be reflected in that file (and vice
  # versa). The group below is a verbatim copy appended inline so Grafana's
  # existing single-file provisioning provider loads it without a second
  # provider entry. When v3.2+ migrates to multi-file provisioning, this
  # block can be deleted and infra/grafana/alerts/ mounted as a directory.
  - orgId: 1
    name: Scraper Self-Healing
    folder: Alerts
    interval: 1m
    rules:
      - uid: scraper-playability-regression
        title: ScraperPlayabilityRegression
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server, reason) (increase(playability_canary_runs_total{result="fail"}[25h]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: diagnostic
          component: scraper
        annotations:
          summary: 'Scraper canary fail: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }})'
          description: 'playability_canary_runs_total recorded a fail in the last 25h for provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}. Maintenance bot dispatch: Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable) per .claude/maintenance-prompt.md.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'

      - uid: scraper-ad-decoy-surge
        title: ScraperAdDecoySurge
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum by (provider, server) (rate(parser_ad_decoy_total[5m]))'
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: diagnostic
          component: scraper
          reason: ad_decoy
        annotations:
          summary: 'Scraper ad-decoy surge: {{ $labels.provider }} / {{ $labels.server }}'
          description: 'parser_ad_decoy_total rate has been > 0 for 5m on provider={{ $labels.provider }}, server={{ $labels.server }}. Maintenance bot dispatch: Pattern 6 (VibePlayer ad-decoy poisoning) — server-priority reorder, WARP toggle, or mark-degraded.'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: ad_decoy

      - uid: scraper-unplayable-spike
        title: ScraperUnplayableSpike
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum by (provider, server, reason) (rate(parser_unplayable_total[5m]))
                / on (provider) group_left
                sum by (provider) (rate(parser_requests_total{operation="get_stream", status="success"}[5m]) > 0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 5m
        labels:
          severity: diagnostic
          component: scraper
        annotations:
          summary: 'Scraper unplayable spike: {{ $labels.provider }} / {{ $labels.server }} ({{ $labels.reason }}) >5%'
          description: 'rate(parser_unplayable_total{provider={{ $labels.provider }}, server={{ $labels.server }}, reason={{ $labels.reason }}}) is >5% of rate(parser_requests_total{operation="get_stream"}) sustained 5m. Maintenance bot dispatch: match `reason` to Pattern 6 (ad_decoy) or Pattern 7 (zero_match / cdn_unreachable / signed_url_expired).'
          provider: '{{ $labels.provider }}'
          server: '{{ $labels.server }}'
          reason: '{{ $labels.reason }}'

  # ============================================================================
  # Anomaly Alerts — spec docs/superpowers/specs/2026-06-24-anomaly-alerts-design.md
  # ============================================================================
  # Source-of-truth: infra/grafana/alerts/anomaly.yaml
  # KEEP IN SYNC: any edit here MUST also be reflected in that file (and vice
  # versa). Verbatim copy appended inline so Grafana's single-file provisioning
  # provider loads it without a second provider entry.
  #
  # Two ClickHouse-datasource (aenigma-clickhouse) rules over analytics.events.
  # NB: provisioned CH alert queries use the NUMERIC `format: 1` (not the string
  # "table" dashboards use) — the backend plugin rejects a string format
  # (reference_grafana_clickhouse_format_enum). Validated via POST /api/ds/query.
  # Both route to maintenance-webhook; no provider/server triple => escalate.
  - orgId: 1
    name: Anomaly Alerts
    folder: Alerts
    interval: 5m
    rules:
      # EgressVolumeAnomaly (warning) — last complete hour > baseline + 3-sigma
      # AND > 500 MiB/h floor, per egress operation over a trailing 168h window.
      - uid: egress-volume-anomaly
        title: EgressVolumeAnomaly
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value FROM (
                  WITH hourly AS (
                    SELECT operation, toStartOfHour(timestamp) AS h, sum(bytes_out + bytes_in) AS b
                    FROM analytics.events
                    WHERE timestamp >= now() - INTERVAL 168 HOUR
                      AND effect_kind = 'egress' AND source = 'be'
                    GROUP BY operation, h),
                  stats AS (
                    SELECT operation,
                      avgIf(b,       h <  toStartOfHour(now()))                   AS baseline_avg,
                      stddevPopIf(b, h <  toStartOfHour(now()))                   AS baseline_sd,
                      anyIf(b,       h =  toStartOfHour(now() - INTERVAL 1 HOUR)) AS last_hour
                    FROM hourly GROUP BY operation)
                  SELECT operation FROM stats
                  WHERE baseline_avg > 0
                    AND last_hour > baseline_avg + 3 * baseline_sd
                    AND last_hour > 524288000)
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: streaming
          reason: egress_anomaly
        annotations:
          summary: 'Egress volume anomaly: {{ $values.B }} operation(s) over hourly baseline (>3σ, >500 MiB/h)'
          description: 'One or more egress operations sent abnormally high volume in the last complete hour (> baseline_avg + 3·σ over the trailing 168h, and > 500 MiB/h). Almost always the video HLS proxy. Open the "Activity Register — Overview" dashboard to see which operation and the volume vs baseline.'
          reason: egress_anomaly

      # ScraperStreamCascadeLatency (warning) — >=3 stream resolves >12s in 1h
      - uid: scraper-stream-cascade-latency
        title: ScraperStreamCascadeLatency
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM analytics.events
                WHERE operation = 'scraper GET /scraper/stream'
                  AND timestamp >= now() - INTERVAL 1 HOUR
                  AND duration_ms > 12000
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: scraper
          reason: stream_cascade_latency
        annotations:
          summary: 'Scraper stream cascade: {{ $values.B }} resolutions over 12s in the last hour'
          description: 'At least 3 `scraper GET /scraper/stream` resolutions exceeded 12 s in the last hour — a multi-provider failover cascade (normal is sub-second warm / 8 s single-gate). Check provider health (/api/anime/_/scraper/health), the Scraper dashboards, and recent parser_fallback_total.'
          reason: stream_cascade_latency

      # AePlayerPlaybackFailures (warning) — ≥2 DISTINCT clients hit a
      # viewer-facing aePlayer failure (auto-failover chain exhausted, viewer
      # hit the error overlay) in 1h. Non-terminal first-party `ae` hiccups the
      # chain recovered from are excluded.
      #
      # Distinctness (AUTO-579/585): both historical firings were one client's
      # retry burst — backend healthy, no regression. Player-pipeline events
      # carry NO identity columns (anonymous_id/session_id/ip_hash all empty —
      # deliberate playback-privacy posture), so the ua|viewport|connection
      # fingerprint from properties.client is the discriminator. Trade-off:
      # two real viewers with identical fingerprints in the same hour would
      # count as one (no page) — accepted for a warning-tier rule; single-user
      # breakage still surfaces via error reports and the playback-health
      # dashboard.
      - uid: aeplayer-playback-failures
        title: AePlayerPlaybackFailures
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT uniqExact(
                    JSONExtractString(properties, 'client', 'ua'),
                    JSONExtractString(properties, 'client', 'viewport'),
                    JSONExtractString(properties, 'client', 'connection')
                  ) AS value
                FROM analytics.events
                WHERE effect_kind = 'player_failed'
                  AND JSONExtractBool(properties, 'all_exhausted') = 1
                  AND timestamp >= now() - INTERVAL 1 HOUR
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: aeplayer
          reason: playback_failed
        annotations:
          summary: 'aePlayer viewer-facing playback failures across {{ $values.B }} distinct clients in the last hour (auto-failover chain exhausted — viewers hit the error overlay)'
          description: 'Two or more DISTINCT clients (ua|viewport|connection fingerprint) hit a viewer-facing aePlayer playback failure in the last hour: the auto-failover chain ran out of sources and the viewer saw the error overlay (all_exhausted=true). Single-client retry bursts no longer fire this (AUTO-579/585 false positives). Non-terminal first-party `ae` hiccups the chain recovered from are deliberately excluded. Drill down in ClickHouse: SELECT timestamp, properties FROM analytics.events WHERE effect_kind = ''player_failed'' AND JSONExtractBool(properties, ''all_exhausted'') = 1 AND timestamp >= now() - INTERVAL 1 HOUR ORDER BY timestamp DESC.'
          reason: playback_failed

      - uid: provider-fleet-no-auto-playable
        title: ProviderFleetNoAutoPlayable
        condition: C
        noDataState: OK
        execErrState: Error
        for: 30m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # Keyed on provider_health_state (health lifecycle), NOT
              # provider_state: since 2026-07-13 down⇒manual⇒provider_state=0, so
              # the failover-participation gauge can no longer distinguish "best
              # is Down" (0) from "disabled/parked" (0). provider_health_state
              # keeps Down=1 regardless of policy. Per group, fires when the
              # HEALTHIEST provider is registered (>=1, so admin-Disabled-only
              # groups — health_state 0 — are excluded) but below
              # serving-or-imminent (<2 => best is Down; Degrading=2 is a one-fail
              # warning still IN auto-failover, Recovering=3 is climbing back).
              # `max by (group)` never yields an empty result, so a fully-Down
              # group still produces a value to threshold.
              expr: (max by (group) (provider_health_state) < 2) and (max by (group) (provider_health_state) >= 1)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Provider group {{ $labels.group }}: no auto-playable source"
          description: "Every registered provider in the {{ $labels.group }} group is confirmed Down (two consecutive failed probes) for 30m — auto-failover cannot serve this group. Check /api/admin/scraper/health and the playback-health roster."

      - uid: provider-fleet-correlated-down
        title: ProviderFleetCorrelatedDown
        condition: C
        noDataState: OK
        execErrState: Error
        # `for: 5m` (was 30m) — the co-incidence signal below is only a ~15m
        # pulse (see expr), so the persistence hold MUST sit inside that window.
        # 5m debounces a single-scrape blip yet still fires well within the
        # burst. Do NOT raise this back toward 30m: it would land outside the
        # pulse and silently disable the rule. Ongoing/steady outages are the
        # job of ProviderFleetNoAutoPlayable, not this event detector.
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              # 20m window so the 15m `offset` lookback below is fully covered.
              from: 1200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              # EDGE-TRIGGERED co-incidence detector (AUTO-577 fix, 2026-07-11).
              # Per group, count providers that transitioned INTO confirmed Down
              # within the last 15m: `Down now` MINUS `already Down 15m ago`. A
              # provider that has been Down for hours/days (an independent,
              # already-diagnosed outage — e.g. the EN group's allanime-okru /
              # animepahe / gogoanime each broken for its own reason at a
              # different time) is NOT "newly down" and does not count, so
              # gradual one-at-a-time attrition can never reach the >=2
              # threshold. Only 2+ providers dropping together inside one 15m
              # window — the signature of a genuine shared-cause burst (e.g. a
              # Camoufox pool crash taking several browser providers at once) —
              # fires. The former `count(provider_state==1) >= 2` fired on ANY
              # two concurrently-broken providers regardless of when they broke,
              # which is exactly the gradual-decay false positive this replaces:
              # the design's "gradual attrition auto-demotes to Degraded(2)"
              # premise does not hold for providers that keep actively failing
              # probes (they stay pinned at Down(1) indefinitely).
              # Keyed on provider_health_state (Down=1) not provider_state: since
              # 2026-07-13 down⇒manual⇒provider_state=0, so the Down signal moved
              # to the health gauge (unaffected by the policy automation).
              expr: count by (group) ((provider_health_state == 1) unless (provider_health_state offset 15m == 1))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Provider group {{ $labels.group }}: {{ $values.B }} sources dropped to Down together (~15m window)"
          description: "{{ $values.B }} providers in the {{ $labels.group }} group transitioned to confirmed Down within ~15 minutes of each other — a co-incident failure burst. This MAY share a root cause (Camoufox pool crash, shared upstream/dependency), but may also be independent provider outages that happened to overlap — verify before assuming a shared dependency. Check /api/admin/scraper/health and the playback-health roster. Note: long-standing, one-at-a-time provider outages do NOT trigger this alert (that is what ProviderFleetNoAutoPlayable covers when a group is left with no auto-playable source)."

      # ProviderDownProlonged (2026-07-15) — roster rot. The two rules above
      # cover the acute cases (a group with no auto-playable source; several
      # providers failing together). Neither ever fires for the slow case: ONE
      # provider dead for days while its groupmates carry the traffic. That
      # provider is not an outage, it is a lie in the roster — it still occupies
      # a failover slot and costs every request a doomed attempt.
      #
      # Duration lives in the expr, NOT in `for:`. min_over_time(...[36h]) == 1
      # means the provider has been pinned at Down for the whole window (any
      # recovery or park pulls the min off 1), which survives a Grafana restart —
      # a `for: 36h` pending timer would not. Retention is 14d, well past 36h.
      #
      # Group-generic and DB-driven: every provider_health_state series comes
      # from the stream_providers roster, so a new provider is covered the day it
      # is added and no provider name appears here. Escape hatch: park it
      # (policy=disabled ⇒ health_state 0 ⇒ min_over_time != 1 ⇒ silent) — the
      # roster then tells the truth and the alert stops. severity: warning; this
      # is hygiene, not a live outage.
      - uid: provider-down-prolonged
        title: ProviderDownProlonged
        condition: C
        noDataState: OK
        execErrState: Error
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min_over_time(provider_health_state[36h]) == 1
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: warning
        annotations:
          summary: "Provider {{ $labels.provider }} ({{ $labels.group }}) has been Down for 36h+"
          description: "provider_health_state{provider=\"{{ $labels.provider }}\"} has been pinned at Down(1) for at least 36 hours — every probe in that window failed. The {{ $labels.group }} group is still being served by its other providers, so this is not an outage; it is a rotted roster row that keeps consuming a failover slot. Either fix it, or park it (set policy=disabled) so the roster reflects reality and this alert goes quiet. Check /api/admin/scraper/health and the playback-health roster."

  # Host Pressure (graceful-degradation Phase 1,
  # docs/superpowers/specs/2026-07-10-graceful-degradation-design.md).
  # Thresholds live in docker/prometheus/rules/degradation.yml — these rules only
  # watch the ae:pressure_level:preview recording rule, so retuning a threshold
  # never touches Grafana provisioning. The `for:` durations are the Phase-1
  # substitute for governor hysteresis. Mirrored in
  # infra/grafana/alerts/host-pressure.yaml (keep in sync).
  - orgId: 1
    name: Host Pressure
    folder: Alerts
    interval: 1m
    rules:
      - uid: host-pressure-sustained
        title: HostPressureSustained
        condition: C
        noDataState: OK
        execErrState: Error
        # for:15m is itself the anti-flap re-arm: after resolving, the condition
        # must hold true a full 15m again before re-firing, so back-to-back pages
        # are structurally >=15m apart. Combined with the recalibrated thresholds
        # (baseline no longer trips Elevated) and the 12h repeat_interval route in
        # policies.yml, this holds the warning to ~one page per 12h. NOTE: Grafana
        # 10.3.3 file provisioning does NOT support keep_firing_for (silently
        # ignored) — do not add it here expecting an effect; revisit on Grafana 11.
        for: 15m
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ae:pressure_level:preview
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: warning
        annotations:
          summary: "Host under sustained pressure (level >= Elevated for 15m)"
          description: "The degradation level preview has been Elevated or worse for 15 minutes. Open the Degradation Overview dashboard (/admin/grafana/d/degradation-overview) — the 'Breached signals' panel names the trigger (PSI cpu/io/mem or low MemAvailable) and the heavy-actors row shows who is eating the box."

      - uid: host-pressure-critical
        title: HostPressureCritical
        condition: C
        noDataState: OK
        execErrState: Error
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ae:pressure_level:preview
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Host pressure CRITICAL (level 2 for 5m)"
          description: "Critical-tier pressure thresholds breached for 5 minutes — latency-sensitive UX (playback, navigation) is likely degrading. Check the Degradation Overview dashboard (/admin/grafana/d/degradation-overview) 'Breached signals' + heavy-actors panels; consider manually pausing library jobs / Camoufox until the Phase-3 automatic actuation ships."
