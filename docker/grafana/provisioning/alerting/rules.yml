apiVersion: 1

groups:
  - orgId: 1
    name: AnimeEnigma Alerts
    folder: AnimeEnigma
    interval: 1m
    rules:
      - uid: service-unreachable
        title: Service Unreachable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: lt
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is unreachable"
          description: "The service {{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes."

      - uid: high-error-rate
        title: High Error Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(http_requests_total{status=~"5.."}[30m])) by (service)
                / sum(rate(http_requests_total[30m])) by (service)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has >5% 5xx error rate for 30 minutes."

      - uid: parser-failure-rate
        title: Parser Failure Rate
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                sum(rate(parser_requests_total{status="error"}[30m])) by (provider)
                / sum(rate(parser_requests_total[30m])) by (provider)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High parser failure rate for {{ $labels.provider }}"
          description: "Parser {{ $labels.provider }} has >50% error rate for 30 minutes."

      - uid: high-p95-latency
        title: High P95 Latency
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{path!~"/admin/.*",service!="streaming"}[30m])) by (service, le))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "Service {{ $labels.service }} P95 latency >2s for 30 minutes."

      - uid: hls-proxy-saturation
        title: HLS Proxy Saturation
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: proxy_active_connections / 50
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HLS proxy near capacity"
          description: "HLS proxy is at >80% capacity ({{ $value }} of 50 max connections) for 2 minutes."

      - uid: scheduler-sync-failure
        title: Scheduler Sync Failure
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: increase(scheduler_job_executions_total{status="error"}[25h])
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 90000
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.job }} failed"
          description: "Scheduler job {{ $labels.job }} has had errors in the last 25 hours."

      - uid: scheduler-sync-stale
        title: Scheduler Sync Stale
        noDataState: Alerting
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job!="calendar_sync"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90000]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Scheduler job {{ $labels.job }} hasn't run successfully"
          description: "Scheduler job {{ $labels.job }} hasn't succeeded in over 25 hours."


      - uid: scheduler-calendar-sync-stale
        title: Scheduler Calendar Sync Stale
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - scheduler_job_last_success_timestamp{exported_job="calendar_sync"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [691200]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Calendar sync hasn't run successfully"
          description: "The calendar_sync job hasn't succeeded in over 8 days (expected weekly on Mondays)."

      - uid: player-unavailable
        title: Player Unavailable
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: player_health_up
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Player {{ $labels.player }} is DOWN"
          description: "Player {{ $labels.player }} has been unavailable for 30+ minutes. Check external API status."
