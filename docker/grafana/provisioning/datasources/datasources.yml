apiVersion: 1

datasources:
  - name: Prometheus
    # UID must stay PBFA97CFB590B2093 — every alert rule and the pre-existing
    # dashboards (playback-health, animeenigma-services, scraper-*, library,
    # watch-together) bind their queries to this exact UID. Renaming it (briefly
    # done during the tracing rollout) orphaned all 14 alert rules with
    # "data source not found". Do NOT change without remapping every reference.
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: false

  - name: Loki
    uid: aenigma-loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          datasourceUid: aenigma-tempo
          url: '$${__value.raw}'
    editable: false

  - name: PostgreSQL
    uid: aenigma-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: postgres
    jsonData:
      database: animeenigma
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: postgres
    editable: false

  - name: Tempo
    type: tempo
    uid: aenigma-tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: aenigma-loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        enabled: true
      # AR-EFFECT-04 (D-12): resolve the Tempo metrics_generator output against
      # Prometheus. serviceMap renders the service graph from traces_service_graph_*
      # and tracesToMetrics surfaces the per-operation RED metrics from
      # traces_spanmetrics_*. Both bind to the existing Prometheus uid (must stay
      # PBFA97CFB590B2093 — see the header warning; reusing/renaming it orphaned
      # 14 alert rules before).
      serviceMap:
        datasourceUid: PBFA97CFB590B2093
      tracesToMetrics:
        datasourceUid: PBFA97CFB590B2093
        spanStartTimeShift: '-2m'
        spanEndTimeShift: '2m'
        queries:
          - name: 'RED rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[$$__rate_interval]))'

  # v4 Activity Register (01-03): ClickHouse clickstream store. The uid
  # aenigma-clickhouse is BRAND NEW — never reuse aenigma-postgres (the header
  # warning above; reusing a uid orphaned 14 alert rules before). The product-
  # analytics dashboard binds its 6 panels to this exact uid. Requires the
  # grafana-clickhouse-datasource plugin (GF_INSTALL_PLUGINS in compose).
  - name: ClickHouse
    uid: aenigma-clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: false
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      secure: false
      # Bare ${VAR} only — Grafana provisioning does NOT support shell
      # ${VAR:-default} (it would be passed through literally, making the CH
      # plugin fall back to the `default` user and fail auth). The defaults are
      # supplied to the grafana container env in docker-compose.yml.
      username: ${CLICKHOUSE_USER}
      defaultDatabase: analytics
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
