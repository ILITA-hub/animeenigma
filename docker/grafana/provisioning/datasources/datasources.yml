apiVersion: 1

# Phase 6 (06-03) — prune the retired provisioned datasources. Removing a block from
# `datasources:` does NOT delete an already-provisioned read-only datasource from
# Grafana's DB; `deleteDatasources` is the provisioning mechanism that prunes them on
# boot. Required because the Tempo + Loki datasources were editable:false (the API
# refuses to delete read-only/provisioned sources). Safe to leave indefinitely.
deleteDatasources:
  - name: Tempo
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: Prometheus
    # UID must stay PBFA97CFB590B2093 — every alert rule and the pre-existing
    # dashboards (playback-health, animeenigma-services, scraper-*, library,
    # watch-together) bind their queries to this exact UID. Renaming it (briefly
    # done during the tracing rollout) orphaned all 14 alert rules with
    # "data source not found". Do NOT change without remapping every reference.
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: false

  # Phase 6 (06-03) — the Loki datasource and its derivedFields trace correlation
  # were REMOVED at the Topology-A cutover. Logs now render from the ClickHouse
  # datasource (analytics.otel_logs); logs<->traces correlation is native on the
  # ClickHouse datasource (trace_id).

  - name: PostgreSQL
    uid: aenigma-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: postgres
    jsonData:
      database: animeenigma
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: postgres
    editable: false

  # The library service runs on its OWN database ("library") on the same Postgres
  # server — the autocache pool (library_episodes/library_jobs/autocache_demand)
  # lives there, NOT in animeenigma, so a Postgres connection is per-database and
  # the "Latest Autocache Downloads" table panel needs this second datasource.
  # Fixed uid (library dashboard panel binds to it); a new uid (never reuse
  # aenigma-postgres — reusing a uid orphaned 14 alert rules before).
  - name: PostgreSQL Library
    uid: aenigma-postgres-library
    type: postgres
    access: proxy
    url: postgres:5432
    user: postgres
    jsonData:
      database: library
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: postgres
    editable: false

  # Phase 6 (06-03) — the Tempo datasource was REMOVED at the Topology-A cutover.
  # Traces now render from the ClickHouse datasource below (analytics.otel_traces,
  # OTel trace builder). The Tempo serviceMap / tracesToMetrics convenience config
  # was the ONLY consumer of the
  # traces_spanmetrics_* / traces_service_graph_* metric names (RESEARCH Pitfall 1,
  # verified) — no alert rule or dashboard panel queries them, so its removal does
  # not break any firing alert or rendered panel.

  # v4 Activity Register (01-03): ClickHouse clickstream store. The uid
  # aenigma-clickhouse is BRAND NEW — never reuse aenigma-postgres (the header
  # warning above; reusing a uid orphaned 14 alert rules before). The product-
  # analytics dashboard binds its 6 panels to this exact uid. Requires the
  # grafana-clickhouse-datasource plugin (GF_INSTALL_PLUGINS in compose).
  #
  # Phase 6 (06-02): EXTENDED in place (lowest-churn, NO new uid — avoids the
  # orphaned-uid hazard entirely) to also serve traces (analytics.otel_traces)
  # and logs (analytics.otel_logs) in OTel mode, so the one CH datasource now
  # carries events + traces + logs. As of the 06-03 cutover this is the SOLE trace
  # and log store for Grafana (the Tempo + Loki datasources were removed above).
  # OTel tables are produced by the OTel Collector clickhouseexporter (06-01); their
  # column layout (TraceId/SpanId/Duration[ns]/ServiceName/… + logs Timestamp/
  # TraceId/SeverityText/Body/…) matches what the plugin's OTel builder expects.
  #
  # Logs<->traces correlation is configured NATIVELY here on trace_id: traces->logs
  # (traceToLogs) and logs->traces (logsToTrace) both resolve against this same
  # datasource (self) because logs carry TraceId.
  - name: ClickHouse
    uid: aenigma-clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: false
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      secure: false
      # Bare ${VAR} only — Grafana provisioning does NOT support shell
      # ${VAR:-default} (it would be passed through literally, making the CH
      # plugin fall back to the `default` user and fail auth). The defaults are
      # supplied to the grafana container env in docker-compose.yml.
      username: ${CLICKHOUSE_USER}
      defaultDatabase: analytics
      # OTel trace view (plugin v4.x): trace-ID search + slow-trace builder over
      # analytics.otel_traces. otelEnabled=true makes the trace builder pre-fill
      # the OTel column mapping for the exporter's standard schema.
      traces:
        defaultDatabase: analytics
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationColumn: Duration
        durationUnit: nanoseconds
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        operationNameColumn: SpanName
        serviceNameColumn: ServiceName
        startTimeColumn: Timestamp
      # OTel log view over analytics.otel_logs. otelEnabled=true maps the
      # exporter's standard log columns (Timestamp/Body/SeverityText/TraceId/…).
      logs:
        defaultDatabase: analytics
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      # Native logs<->traces linking on trace_id (replaces Loki derivedField ->
      # Tempo). Both directions resolve to THIS datasource (self) since events,
      # traces, and logs all live in ClickHouse and logs carry TraceId.
      traceToLogs:
        datasourceUid: aenigma-clickhouse
      logsToTrace:
        datasourceUid: aenigma-clickhouse
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
