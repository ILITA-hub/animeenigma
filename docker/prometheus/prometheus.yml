global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Degradation-awareness recording rules (ae:* pressure signals + level preview).
# Mounted as a DIRECTORY (./prometheus/rules) so future rule edits only need a
# reload — unlike this file, whose single-file bind mount pins the inode and
# needs a container recreate after edits.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['localhost:9090']

  # AnimeEnigma services
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: /metrics

  - job_name: 'auth'
    static_configs:
      - targets: ['auth:8080']
    metrics_path: /metrics

  - job_name: 'catalog'
    static_configs:
      - targets: ['catalog:8081']
    metrics_path: /metrics

  - job_name: 'streaming'
    static_configs:
      - targets: ['streaming:8082']
    metrics_path: /metrics

  - job_name: 'player'
    static_configs:
      - targets: ['player:8083']
    metrics_path: /metrics

  - job_name: 'rooms'
    static_configs:
      - targets: ['rooms:8084']
    metrics_path: /metrics

  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8085']
    metrics_path: /metrics

  - job_name: 'themes'
    static_configs:
      - targets: ['themes:8086']
    metrics_path: /metrics

  - job_name: 'scraper'
    static_configs:
      - targets: ['scraper:8088']
    metrics_path: /metrics

  - job_name: 'notifications'
    static_configs:
      - targets: ['notifications:8090']
    metrics_path: /metrics

  - job_name: 'watch-together'
    static_configs:
      - targets: ['watch-together:8091']
    metrics_path: /metrics

  - job_name: 'analytics'
    static_configs:
      - targets: ['analytics:8092']
    metrics_path: /metrics

  - job_name: 'recs'
    static_configs:
      - targets: ['recs:8094']
    metrics_path: /metrics

  - job_name: 'policy'
    static_configs:
      - targets: ['policy:8098']
    metrics_path: /metrics

  # Degradation governor (graceful-degradation Phase 2): exposes the
  # authoritative ae_degradation_level / ae_degradation_reason_active gauges
  # rendered on the Degradation Overview dashboard.
  - job_name: 'governor'
    static_configs:
      - targets: ['governor:8100']
    metrics_path: /metrics

  # Camoufox sidecar (stealth-scraper). Was never scraped before 2026-07-10 —
  # its stealth_* pool/RAM gauges and the Phase-3 ae_degradation_shed{camoufox}
  # gauge feed the Degradation Overview heavy-actors + shed panels.
  - job_name: 'stealth-scraper'
    static_configs:
      - targets: ['stealth-scraper:3000']
    metrics_path: /metrics

  - job_name: 'library'
    static_configs:
      - targets: ['library:8089']
    metrics_path: /metrics

  # audit #23 — anidle + gacha expose /metrics + emit traces but were not
  # scraped, so they had no metrics and no outage alerting.
  - job_name: 'anidle'
    static_configs:
      - targets: ['anidle:8095']
    metrics_path: /metrics

  - job_name: 'gacha'
    static_configs:
      - targets: ['gacha:8093']
    metrics_path: /metrics

  - job_name: 'upscaler'
    static_configs:
      - targets: ['upscaler:8096']
    metrics_path: /metrics

  # ClickHouse native self-metrics (v4.0 Activity Register Phase 1, AR-STORE-01).
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics

  # Host bandwidth (vnstat). The vnstat-exporter container reads the host's
  # /var/lib/vnstat DB (eth0) and exposes per-interface RX/TX totals + month/day
  # gauges. Drives the "Server Bandwidth" Grafana dashboard.
  - job_name: 'vnstat'
    static_configs:
      - targets: ['vnstat-exporter:9100']
    metrics_path: /metrics

  # Host pressure signals (CPU/memory/disk/PSI) for the graceful-degradation
  # awareness layer (docs/superpowers/specs/2026-07-10-graceful-degradation-design.md).
  # node-exporter reads the host's /proc + /sys via ro mounts; the PSI
  # pressure-stall metrics (node_pressure_*) are the primary "under pressure"
  # signals consumed by docker/prometheus/rules/degradation.yml.
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics

  # M571: OTel Collector self-telemetry (otelcol_*). The collector exposes its own
  # pipeline-health metrics on :8888 (service.telemetry.metrics in collector-config.yaml).
  # Scraping it makes the trace/log pipeline observable (drop/send-failure counters)
  # and puts the collector in the `up` series for liveness alerting.
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics
