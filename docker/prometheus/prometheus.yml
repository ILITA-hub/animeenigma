global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['localhost:9090']

  # AnimeEnigma services
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: /metrics

  - job_name: 'auth'
    static_configs:
      - targets: ['auth:8080']
    metrics_path: /metrics

  - job_name: 'catalog'
    static_configs:
      - targets: ['catalog:8081']
    metrics_path: /metrics

  - job_name: 'streaming'
    static_configs:
      - targets: ['streaming:8082']
    metrics_path: /metrics

  - job_name: 'player'
    static_configs:
      - targets: ['player:8083']
    metrics_path: /metrics

  - job_name: 'rooms'
    static_configs:
      - targets: ['rooms:8084']
    metrics_path: /metrics

  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8085']
    metrics_path: /metrics

  - job_name: 'themes'
    static_configs:
      - targets: ['themes:8086']
    metrics_path: /metrics

  - job_name: 'scraper'
    static_configs:
      - targets: ['scraper:8088']
    metrics_path: /metrics

  - job_name: 'notifications'
    static_configs:
      - targets: ['notifications:8090']
    metrics_path: /metrics

  - job_name: 'watch-together'
    static_configs:
      - targets: ['watch-together:8091']
    metrics_path: /metrics

  - job_name: 'analytics'
    static_configs:
      - targets: ['analytics:8092']
    metrics_path: /metrics

  - job_name: 'recs'
    static_configs:
      - targets: ['recs:8094']
    metrics_path: /metrics

  - job_name: 'library'
    static_configs:
      - targets: ['library:8089']
    metrics_path: /metrics

  # ClickHouse native self-metrics (v4.0 Activity Register Phase 1, AR-STORE-01).
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics
