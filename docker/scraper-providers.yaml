# Scraper EN-provider management — SOURCE OF TRUTH (replaces SCRAPER_DEGRADED_PROVIDERS).
#
# Edit this file, then: docker compose -f docker/docker-compose.yml restart scraper
# (no rebuild). `enabled: false` removes a provider from the failover chain with
# zero per-request cost. `reason` (short) + `description` (full why) render in the
# Grafana "Scraper / Provider Management" dashboard. Git history = who/when audit;
# the dashboard state-timeline = when each provider was disconnected/reconnected.
#
# Every entry REQUIRES name + enabled. Known names: gogoanime, animepahe, allanime,
# animefever, miruro, nineanime, animekai, 18anime. An unknown name fails the scraper at boot.
#
# `group` is OPTIONAL and INTRINSIC (validated, not freely editable): EN providers
# default to group "en"; "18anime" is group "adult". The "adult" group runs in a
# SEPARATE orchestrator on /anime18/* routes and is NEVER part of the EN failover
# chain — so enabling/disabling 18anime here only affects the 18+ player.
#
# ─── EN PROVIDER PLAYERS / STREAM TYPES / FORMATS (reference) ────────────────────
# Each provider resolves an upstream embed PLAYER, which the scraper's embed
# extractors (services/scraper/internal/embeds/) turn into a playable stream:
#
#   provider     upstream / embed player                     extractor       stream type
#   ──────────   ─────────────────────────────────────────  ─────────────   ───────────
#   gogoanime    gogoanimes.fi → gogoanime.me.uk/newplayer    megaplay        HLS (m3u8)
#                .php → nests megaplay.buzz player
#   nineanime    9anime.me.uk → 1anime.site → megaplay.buzz   megaplay        HLS (m3u8)
#                (genuinely-unavailable anime → YouTube stub → youtube_stub guard → failover)
#   allanime     allmanga.to API → fast4speed.rsvp            (direct)        MP4 (signed)
#   animefever   animefever.cc → am.vidstream.vip             vidstream_vip   HLS (m3u8)
#                tserver = extractable; hserver = Hydrax iframe (NOT extractable — see Hydrax TODO ISS)
#   miruro       miruro.tv secure-pipe (pure-Go obfuscation)  (inline)        HLS (m3u8)
#   animepahe    animepahe.pw (stealth sidecar) → Kwik        kwik            HLS (m3u8)
#   18anime      18anime.me (adult group)                     megacloud/...   HLS (m3u8)
#
# Other extractors: streamhg, earnvids, vibeplayer, megacloud (legacy / per-embed).
#
# STREAM TRUST MODEL: the streaming HLS proxy gate is `allowlisted OR signed`.
# Catalog's GetScraperStream signs every scraper-resolved sources[].url / tracks[].file
# (libs/videoutils.SignStreamURL); the proxy then mints HMAC provenance tokens for the
# rotating child/segment CDNs. => a NEW upstream CDN host needs NO static allowlist entry.
# (The libs/videoutils/proxy.go static allowlist is now a legacy fallback being phased out.)
# ────────────────────────────────────────────────────────────────────────────────
providers:
  - name: allanime
    enabled: true
    supports_sub: true
    supports_dub: true
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 90

  - name: gogoanime
    enabled: true
    reason: "Revived via gogoanimes.fi mirror + megaplay"
    description: >
      anitaku.to migrated to anineko.to ("We Have Moved"). Repointed
      SCRAPER_GOGOANIME_BASE_URL to gogoanimes.fi (classic gogo HTML:
      anime_muti_link + /search.html), whose newplayer.php embed nests the
      megaplay.buzz player — now routed through the megaplay extractor
      (gogoanime.me.uk added to its wrapper allowlist). Re-enabled 2026-06-05.
    supports_sub: true
    supports_dub: true
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 85

  - name: miruro
    enabled: true
    supports_sub: true
    supports_dub: true
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 70

  - name: animefever
    enabled: true
    supports_sub: true
    supports_dub: false
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 60

  - name: nineanime
    enabled: true
    supports_sub: true
    supports_dub: false
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 720p
    preference_weight: 40

  - name: animepahe
    enabled: false
    reason: "Cloudflare challenge"
    description: >
      animepahe.pw migrated DDoS-Guard -> Cloudflare managed challenge; the
      stealth-Chromium sidecar can't solve it (0% solve rate). See ISS-023.
      Disabled 2026-06-03.
    supports_sub: true
    supports_dub: true
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 30

  - name: animekai
    enabled: false
    reason: "Stub — ListServers unimplemented (SCRAPER-KAI-03)"
    description: >
      animekai provider is a stub; ListServers returns ErrProviderDown.
      Disabled until implemented so it never wastes a failover slot.
    supports_sub: true
    supports_dub: false
    supports_raw: false
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 0

  - name: 18anime
    enabled: true
    group: adult
    reason: "18+ provider (separate group)"
    description: >
      18anime.me hentai source for the 18+ player. Runs in its own orchestrator
      on /anime18/* — NEVER part of the EN (OurEnglish) failover chain.
    supports_sub: true
    supports_dub: false
    supports_raw: true
    sub_delivery: hard
    quality_ceiling: 1080p
    preference_weight: 0
