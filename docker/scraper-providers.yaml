# Scraper EN-provider management — SOURCE OF TRUTH (replaces SCRAPER_DEGRADED_PROVIDERS).
#
# Edit this file, then: docker compose -f docker/docker-compose.yml restart scraper
# (no rebuild). `enabled: false` removes a provider from the failover chain with
# zero per-request cost. `reason` (short) + `description` (full why) render in the
# Grafana "Scraper / Provider Management" dashboard. Git history = who/when audit;
# the dashboard state-timeline = when each provider was disconnected/reconnected.
#
# Every entry REQUIRES name + enabled. Known names: gogoanime, animepahe, allanime,
# animefever, miruro, nineanime, animekai, 18anime. An unknown name fails the scraper at boot.
#
# `group` is OPTIONAL and INTRINSIC (validated, not freely editable): EN providers
# default to group "en"; "18anime" is group "adult". The "adult" group runs in a
# SEPARATE orchestrator on /anime18/* routes and is NEVER part of the EN failover
# chain — so enabling/disabling 18anime here only affects the 18+ player.
providers:
  - { name: allanime,  enabled: true }
  - { name: animefever, enabled: true }
  - { name: miruro,    enabled: true }
  # AUTO-362: disabled 2026-06-05 — nineanime's upstream brand-jack rebrand now
  # serves YouTube stubs (parser_zero_match_total youtube_stub=27, video_mp4_source
  # miss=20) instead of real MP4s. It's the last-resort provider; allanime + miruro
  # cover EN with real-bytes-green streams, so this only removes probe noise.
  - { name: nineanime, enabled: false }

  # 18+ group — separate orchestrator, not in the EN chain.
  - name: 18anime
    enabled: true
    group: adult
    reason: "18+ provider (separate group)"
    description: >
      18anime.me hentai source for the 18+ player. Runs in its own orchestrator
      on /anime18/* — NEVER part of the EN (OurEnglish) failover chain.

  - name: animepahe
    enabled: false
    reason: "Cloudflare challenge"
    description: >
      animepahe.pw migrated DDoS-Guard -> Cloudflare managed challenge; the
      stealth-Chromium sidecar can't solve it (0% solve rate). See ISS-023.
      Disabled 2026-06-03.

  - name: gogoanime
    enabled: false
    reason: "Platform rebrand"
    description: >
      anitaku.to migrated to a different platform the parser can't handle.
      Disabled 2026-05-13.
