<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- Default tab icon = brand-mark. The router swaps these to the legacy
         cat seal (favicon-admin.*) on /admin/* via @/utils/favicon. -->
    <link id="favicon-ico" rel="icon" type="image/x-icon" href="/favicon.ico">
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <!-- viewport-fit=cover is ORIENTATION-CONDITIONAL (2026-07-17, fourth
         round of under-island work — full history so nobody relitigates
         blind; every line below is an on-device iPhone verdict):
         · PORTRAIT browser + cover = black band in the status-bar/island
           zone. First seen 07-02, blamed on fixed elements 07-03 (those were
           real, independent bugs), re-confirmed 07-17 with all fixed-element
           causes eliminated — the portrait cover fight is REAL on iOS 26.
           Without cover, Safari tints the zone with the page background —
           seamless (wanikani-style). So portrait ships WITHOUT cover.
         · LANDSCAPE + cover = clean edge-to-edge (photo 2026-07-17T02-42-27:
           fullscreen video reaches the physical edges, no band). Without
           cover, landscape letterboxes the player takeover away from the
           island (photos 2026-07-16). So landscape ships WITH cover.
         · Mid-session runtime swaps WITHOUT rotation are ignored by iOS
           (setAttribute AND node replacement, both disproven on-device) —
           but rotation forces a viewport re-evaluation, so flipping the
           content on the orientation MQ change is applied at the moment it
           matters. Installed PWA (no Safari chrome) keeps cover always.
         env(safe-area-inset-*) compensation is wired throughout: body
         padding via --safe-* (main.css), navbar/toaster/quicknav offsets,
         and the player takeover pads its overlay rows; all of it is inert
         (env()=0) whenever cover is off. Only a real iPhone can verify
         changes here — check BOTH portrait island zone and landscape
         fullscreen. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      (function () {
        var meta = document.querySelector('meta[name="viewport"]')
        var base = 'width=device-width, initial-scale=1.0'
        var standalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true
        var landscape = window.matchMedia('(orientation: landscape)')
        function apply () {
          meta.setAttribute('content', standalone || landscape.matches
            ? base + ', viewport-fit=cover'
            : base)
        }
        apply()
        if (!standalone) landscape.addEventListener('change', apply)
      })()
    </script>
    <!-- Installed-PWA mode (Add to Home Screen): black-translucent makes the
         iOS status bar transparent so the page truly renders behind the
         notch/Dynamic Island; safe-area offsets in main.css keep content
         clear of it. In-browser Safari ignores these. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AnimeEnigma">
    <!-- Dark canvas BEFORE any stylesheet loads — otherwise Firefox paints its
         default white <html> background for a frame on hard reload (and behind
         posters that haven't decoded yet). color-scheme makes the browser's own
         default canvas dark; the inline bg pins the exact base color (#08080f =
         --color-base) so there is no white flash. -->
    <meta name="color-scheme" content="dark">
    <!-- body margin: main.css (with the preflight reset) hasn't loaded at
         boot, so the UA's default 8px margin would offset the app-shell. -->
    <style>html{background-color:#08080f}body{margin:0}</style>
    <!-- Instant app-shell (2026-07-06 first-load trace): on a ~1Mbps self-hosted
         link the entry bundle takes ~3s to arrive, and #app was empty until Vue
         mounted — so first paint was a 3.2s dark blank. This inline shell (no
         extra request, styles inlined since main.css hasn't loaded yet) paints a
         branded loader at HTML-arrival instead. Vue's mount() replaces #app's
         children, so the shell auto-removes the instant the app takes over. -->
    <!-- Mirrors the DS Spinner (components/ui/Spinner.vue, signature tone, xl):
         dual counter-rotating arcs — cyan (--brand-cyan) top/bottom, pink
         (--brand-pink) left/right. Hexes hardcoded because main.css hasn't
         loaded yet at boot; keep in sync with the tokens if they change. -->
    <!-- #ae-boot MUST stay in normal flow — NEVER position:fixed. iOS 26
         Safari samples every fixed element touching the viewport's top edge
         to pick its status-bar treatment (docs/issues + on-device bisection
         2026-07-03): one fixed inset-0 element at load — even this spinner,
         removed at Vue mount — flips the zone to permanent opaque bands
         above AND below the page ("полосы за динамическим островком",
         report 2026-07-15T13-09-27). A static 100svh block renders
         identically here (#app is empty at boot) without touching the
         heuristic. -->
    <style>
      #ae-boot{min-height:100vh;min-height:100svh;display:flex;
        align-items:center;justify-content:center;background:#08080f}
      #ae-boot .ae-boot-spinner{position:relative;width:52px;height:52px}
      #ae-boot .ae-boot-spinner::before,
      #ae-boot .ae-boot-spinner::after{content:"";position:absolute;border-radius:9999px;
        border-style:solid;border-color:transparent;box-sizing:border-box}
      #ae-boot .ae-boot-spinner::before{inset:0;border-width:4px;
        border-top-color:#00d4ff;border-bottom-color:#00d4ff;
        animation:ae-boot-spin .8s linear infinite}
      #ae-boot .ae-boot-spinner::after{inset:10px;border-width:4px;
        border-left-color:#ff2d7c;border-right-color:#ff2d7c;
        animation:ae-boot-spin-rev 1.1s linear infinite}
      @keyframes ae-boot-spin{to{transform:rotate(360deg)}}
      @keyframes ae-boot-spin-rev{to{transform:rotate(-360deg)}}
      @media (prefers-reduced-motion:reduce){#ae-boot .ae-boot-spinner::before,
        #ae-boot .ae-boot-spinner::after{animation-duration:2.4s}}
    </style>
    <link rel="dns-prefetch" href="https://telegram.org">
    <link rel="preconnect" href="https://telegram.org" crossorigin>
    <link rel="dns-prefetch" href="https://oauth.telegram.org">
    <link rel="preconnect" href="https://oauth.telegram.org" crossorigin>
    <!-- Posters are served straight from Shikimori — warm the connection so the
         anime page's hero image doesn't pay DNS+TCP+TLS mid-load. -->
    <!-- no crossorigin: posters load as plain <img> (non-CORS), and a CORS
         preconnect would open a connection those fetches can't reuse. -->
    <link rel="dns-prefetch" href="https://shikimori.io">
    <link rel="preconnect" href="https://shikimori.io">
    <!-- inter 500/600 are the DS-mandated font-medium/font-semibold weights and
         manrope-800/manrope-cyr render above-the-fold headings — without preload
         they are only discovered via CSS one RTT after first render. -->
    <link rel="preload" href="/fonts/manrope-800.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/manrope-cyr.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
    <!-- inter-cyr is the Cyrillic body subset — the audience is Russian-first, so
         it's as critical as the Latin weights above (manrope-cyr, the heading
         subset, is already preloaded). Without it, Russian body text FOUTs to a
         fallback until the on-demand subset lands. -->
    <link rel="preload" href="/fonts/inter-cyr.woff2" as="font" type="font/woff2" crossorigin>
    <title>AnimeEnigma - Anime Streaming Platform</title>
    <meta name="description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="AnimeEnigma - Anime Streaming Platform">
    <meta property="og:description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:site_name" content="AnimeEnigma">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AnimeEnigma - Anime Streaming Platform">
    <meta name="twitter:description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <script>
      // Disable native scroll restoration as early as possible — before any
      // module loads. Setting this inside router/index.ts (a deferred module)
      // ran too late: the browser had often already restored a stale scroll
      // position on refresh, then async content (ContinueWatchingRow,
      // spotlight cards) shifted the layout under it and the page appeared to
      // "randomly scroll". The router's scrollBehavior continues to handle
      // back/forward via savedPosition; only the browser's auto-restore is
      // turned off here.
      if ('scrollRestoration' in history) { history.scrollRestoration = 'manual' }
    </script>
    <script>
      // RU static-edge asset routing (decide-once + cached). The probe in
      // utils/assetEdge.ts measures origin vs the edge and stores the winning
      // asset base in localStorage; this inline script applies it BEFORE any
      // module loads, so Vite's renderBuiltUrl runtime calls resolve dynamic
      // chunk URLs to it. No-op (origin) when nothing is cached / feature off.
      (function () {
        var base = ''
        try {
          var c = JSON.parse(localStorage.getItem('ae.assetEdge') || 'null')
          if (c && typeof c.base === 'string' && typeof c.exp === 'number' && c.exp > Date.now()) {
            base = c.base
          }
        } catch (e) { /* ignore */ }
        window.__AE_ASSET_BASE__ = base
        window.__assetHost = function (f) {
          return (window.__AE_ASSET_BASE__ || '') + '/' + String(f).replace(/^\/+/, '')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app">
      <div id="ae-boot" aria-hidden="true">
        <div class="ae-boot-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
