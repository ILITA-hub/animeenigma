<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- Default tab icon = brand-mark. The router swaps these to the legacy
         cat seal (favicon-admin.*) on /admin/* via @/utils/favicon. -->
    <link id="favicon-ico" rel="icon" type="image/x-icon" href="/favicon.ico">
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <!-- viewport-fit=cover: draw edge-to-edge on notch/Dynamic-Island phones —
         the page canvas shows behind and beside the cutout instead of a black
         letterbox. Layout compensates via env(safe-area-inset-*) (main.css). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- NO theme-color meta on purpose: iOS Safari paints the theme-color as
         an opaque band over the status-bar zone, defeating viewport-fit=cover
         (content briefly showed behind the Dynamic Island, then Safari tinted
         it solid). Without it Safari keeps the zone transparent; the PWA
         manifest still carries theme_color for installed mode. -->
    <!-- Installed-PWA mode (Add to Home Screen): black-translucent makes the
         iOS status bar transparent so the page truly renders behind the
         notch/Dynamic Island; safe-area offsets in main.css keep content
         clear of it. In-browser Safari ignores these. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AnimeEnigma">
    <!-- Dark canvas BEFORE any stylesheet loads — otherwise Firefox paints its
         default white <html> background for a frame on hard reload (and behind
         posters that haven't decoded yet). color-scheme makes the browser's own
         default canvas dark; the inline bg pins the exact base color (#08080f =
         --color-base) so there is no white flash. -->
    <meta name="color-scheme" content="dark">
    <style>html{background-color:#08080f}</style>
    <link rel="dns-prefetch" href="https://telegram.org">
    <link rel="preconnect" href="https://telegram.org" crossorigin>
    <link rel="dns-prefetch" href="https://oauth.telegram.org">
    <link rel="preconnect" href="https://oauth.telegram.org" crossorigin>
    <!-- Posters are served straight from Shikimori — warm the connection so the
         anime page's hero image doesn't pay DNS+TCP+TLS mid-load. -->
    <!-- no crossorigin: posters load as plain <img> (non-CORS), and a CORS
         preconnect would open a connection those fetches can't reuse. -->
    <link rel="dns-prefetch" href="https://shikimori.io">
    <link rel="preconnect" href="https://shikimori.io">
    <!-- inter 500/600 are the DS-mandated font-medium/font-semibold weights and
         manrope-800/manrope-cyr render above-the-fold headings — without preload
         they are only discovered via CSS one RTT after first render. -->
    <link rel="preload" href="/fonts/manrope-800.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/manrope-cyr.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
    <title>AnimeEnigma - Anime Streaming Platform</title>
    <meta name="description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="AnimeEnigma - Anime Streaming Platform">
    <meta property="og:description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:site_name" content="AnimeEnigma">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AnimeEnigma - Anime Streaming Platform">
    <meta name="twitter:description" content="Watch anime for free with subtitles. Stream the latest episodes and classic series in English and Russian.">
    <script>
      // Disable native scroll restoration as early as possible — before any
      // module loads. Setting this inside router/index.ts (a deferred module)
      // ran too late: the browser had often already restored a stale scroll
      // position on refresh, then async content (ContinueWatchingRow,
      // spotlight cards) shifted the layout under it and the page appeared to
      // "randomly scroll". The router's scrollBehavior continues to handle
      // back/forward via savedPosition; only the browser's auto-restore is
      // turned off here.
      if ('scrollRestoration' in history) { history.scrollRestoration = 'manual' }
    </script>
    <script>
      // RU static-edge asset routing (decide-once + cached). The probe in
      // utils/assetEdge.ts measures origin vs the edge and stores the winning
      // asset base in localStorage; this inline script applies it BEFORE any
      // module loads, so Vite's renderBuiltUrl runtime calls resolve dynamic
      // chunk URLs to it. No-op (origin) when nothing is cached / feature off.
      (function () {
        var base = ''
        try {
          var c = JSON.parse(localStorage.getItem('ae.assetEdge') || 'null')
          if (c && typeof c.base === 'string' && typeof c.exp === 'number' && c.exp > Date.now()) {
            base = c.base
          }
        } catch (e) { /* ignore */ }
        window.__AE_ASSET_BASE__ = base
        window.__assetHost = function (f) {
          return (window.__AE_ASSET_BASE__ || '') + '/' + String(f).replace(/^\/+/, '')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
