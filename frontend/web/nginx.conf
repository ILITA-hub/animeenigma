# Detect social media / search engine bots by User-Agent
map $http_user_agent $is_bot {
    default                     0;
    ~*bot                       1;
    ~*crawl                     1;
    ~*spider                    1;
    ~*slurp                     1;
    ~*facebookexternalhit       1;
    ~*Facebot                   1;
    ~*LinkedInBot               1;
    ~*Twitterbot                1;
    ~*WhatsApp                  1;
    ~*TelegramBot               1;
    ~*Discordbot                1;
    ~*Googlebot                 1;
    ~*bingbot                   1;
    ~*yandex                    1;
    ~*DuckDuckBot               1;
    ~*Slackbot                  1;
    ~*vkShare                   1;
    ~*Applebot                  1;
    ~*Redditbot                 1;
    ~*Pinterestbot              1;
    ~*Viber                     1;
    ~*SkypeUriPreview           1;
    ~*Embedly                   1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff2;

    # Serve pre-compressed .gz files from Vite build (zero CPU cost)
    gzip_static on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy API requests to gateway
    location /api/ {
        client_max_body_size 2m;
        proxy_pass http://animeenigma-gateway:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # OG meta tags for anime pages — serve to bots, SPA to humans
    location ~ ^/anime/([a-zA-Z0-9_-]+)$ {
        if ($is_bot) {
            rewrite ^/anime/(.+)$ /og/anime/$1 break;
            proxy_pass http://animeenigma-gateway:8000;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # OG meta tags for home page — serve to bots, SPA to humans
    location = / {
        if ($is_bot) {
            proxy_pass http://animeenigma-gateway:8000/og/home;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html so new JS deploys are picked up immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
