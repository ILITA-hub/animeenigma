<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AE edge test F</title>
<style>
  html { background: #08080f; }
  body {
    margin: 0; font-family: -apple-system, sans-serif;
    padding-top: env(safe-area-inset-top, 0px);
    background:
      radial-gradient(1000px 600px at 80% -200px, rgba(0, 212, 255, 0.08), transparent 60%),
      radial-gradient(800px 500px at -10% 10%, rgba(255, 45, 124, 0.06), transparent 60%),
      #08080f;
  }
  #app { overflow-x: clip; background: #08080f; min-height: 100vh; }
  .cap { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 8px); left: 16px; right: 16px; height: 56px; z-index: 50; background: transparent; }
  .cap .glass { position: absolute; inset: 0; border-radius: 16px; background: rgba(0,0,0,.4); -webkit-backdrop-filter: blur(24px) saturate(1.5); backdrop-filter: blur(24px) saturate(1.5); border: 1px solid rgba(255,255,255,.1); }
  .cap span { position: relative; display: flex; align-items: center; height: 100%; padding: 0 16px; color: #fff; font-weight: 700; }
  .rainbow { height: 300vh; background: linear-gradient(180deg, #ff2d7c 0%, #ff8a00 15%, #ffe600 30%, #00d4ff 50%, #7c4dff 70%, #ff2d7c 100%); }
  .top-mark { padding: 2px 8px; color: #fff; font-weight: 700; font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  .label { padding: 80px 16px 8px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
  .label b { font-size: 40px; }
  .label small { display: block; font-size: 14px; margin-top: 6px; line-height: 1.4; }
  .links { display: flex; gap: 8px; padding: 12px 16px; }
  .links a { display: block; padding: 10px 16px; background: rgba(0,0,0,.45); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 18px; }
</style>
</head>
<body>
<div class="cap"><div class="glass"></div><span>капсула (fixed)</span></div>
<div id="app">
<div class="rainbow">
  <div class="top-mark">&#9650; самый верх страницы &#9650;</div>
  <div class="label">
    <b>ТЕСТ F</b> = полная копия сайта: cover + капсула + clip + PWA-меты + тёмный фон
    <small>Должен повторить проблему сайта. Сравни с A и E при скролле.</small>
  </div>
  <div class="links"><a href="/edge-a.html">A</a><a href="/edge-b.html">B</a><a href="/edge-c.html">C</a><a href="/edge-d.html">D</a><a href="/edge-e.html">E</a><a href="/edge-f.html">F</a></div>
</div>
</div>
</body>
</html>
