<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>AE edge test I</title>
<style>
  html { background: #08080f; scroll-behavior: smooth; color-scheme: dark; }
  body {
    margin: 0; font-family: -apple-system, sans-serif; color: #fff;
    padding-top: env(safe-area-inset-top, 0px);
    background:
      radial-gradient(1000px 600px at 80% -200px, rgba(0, 212, 255, 0.08), transparent 60%),
      radial-gradient(800px 500px at -10% 10%, rgba(255, 45, 124, 0.06), transparent 60%),
      #08080f;
  }
  #app { overflow-x: clip; background: #08080f; min-height: 100vh; }
  .cap { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 8px); left: 16px; right: 16px; height: 56px; z-index: 50; background: transparent; transition: transform .3s; }
  .cap .glass { position: absolute; inset: 0; border-radius: 16px; background: rgba(0,0,0,.4); -webkit-backdrop-filter: blur(24px) saturate(1.5); backdrop-filter: blur(24px) saturate(1.5); border: 1px solid rgba(255,255,255,.1); }
  .cap span { position: relative; display: flex; align-items: center; height: 100%; padding: 0 16px; font-weight: 700; }
  .cap.hidden-cap { transform: translateY(calc(-100% - env(safe-area-inset-top, 0px) - 48px)); }
  .rainbow { height: 300vh; background: linear-gradient(180deg, #ff2d7c 0%, #ff8a00 15%, #ffe600 30%, #00d4ff 50%, #7c4dff 70%, #ff2d7c 100%); }
  .top-mark { padding: 2px 8px; font-weight: 700; font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  .label { padding: 80px 16px 8px; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
  .label b { font-size: 40px; }
  .label small { display: block; font-size: 14px; margin-top: 6px; line-height: 1.4; }
  .links { display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap; }
  .links a { display: block; padding: 10px 16px; background: rgba(0,0,0,.45); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 18px; }
</style>
<script>
  if ('scrollRestoration' in history) { history.scrollRestoration = 'manual' }
</script>
</head>
<body>
<div class="cap" id="cap"><div class="glass"></div><span>капсула (fixed)</span></div>
<div id="app"><div class="rainbow">
  <div class="top-mark">&#9650; самый верх страницы &#9650;</div>
  <div class="label"><b>ТЕСТ I</b> = как H, но контент есть С САМОГО НАЧАЛА (не SPA)
  <small>Убрана поздняя вставка контента: радуга в HTML с первого байта, всё остальное как в H. РАДУГА тут = виновата SPA-архитектура (пустая страница при загрузке).</small></div>
  <div class="links"><a href="/edge-a.html">A</a><a href="/edge-b.html">B</a><a href="/edge-c.html">C</a><a href="/edge-d.html">D</a><a href="/edge-e.html">E</a><a href="/edge-f.html">F</a><a href="/edge-g.html">G</a><a href="/edge-h.html">H</a><a href="/edge-i.html">I</a><a href="/edge-j.html">J</a><a href="/edge-k.html">K</a><a href="/edge-l.html">L</a><a href="/edge-m.html">M</a></div>
</div></div>
<script>
  // Content is static; only the router-like scrollTo remains on the SPA timer.
  setTimeout(function () {
    requestAnimationFrame(function () { window.scrollTo({ top: 0 }) })
  }, 1200)

  var lastY = 0
  addEventListener('scroll', function () {
    var y = scrollY
    document.getElementById('cap').classList.toggle('hidden-cap', y > lastY && y > 100)
    lastY = y
  }, { passive: true })
</script>
</body>
</html>
