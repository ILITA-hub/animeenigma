apiVersion: 1

# Anomaly alerts (spec docs/superpowers/specs/2026-06-24-anomaly-alerts-design.md).
#
# Two ClickHouse-datasource (uid aenigma-clickhouse) rules over analytics.events,
# the Activity Register wide-event table. Both route to the existing
# `maintenance-webhook` contact point. Neither carries the provider/server/reason
# triple the maintenance bot auto-fixes on, so both correctly degrade to
# "escalate" (a plain admin notification) — intended for "egress spiked" and
# "stream resolution is cascading".
#
# CRITICAL — ClickHouse alerting format (reference_grafana_clickhouse_format_enum):
# provisioned alert rules hit the grafana-clickhouse-datasource BACKEND directly,
# which takes `format` as a NUMERIC enum (1 = table), NOT the string "table" that
# dashboard panels use. A string format => "invalid format value" => the rule
# errors. Both queries below use `format: 1` and were validated end-to-end via
# POST /api/ds/query before shipping.
#
# Source-of-truth: this file. The same two rules are appended inline into
# docker/grafana/provisioning/alerting/rules.yml (Option-A wiring — that file is
# the ACTIVE provisioning provider copied to /etc/grafana/provisioning at boot;
# this directory is mounted to a non-provisioning path for future use). Keep the
# two copies in sync.
#
# Thresholds calibrated 2026-06-24 against live data:
#   - Egress: the only large egress operation is `streaming GET /api/v1/hls-proxy`
#     (avg 309 / p95 863 / max 1694 MiB/h). The 500 MiB/h floor cleanly isolates
#     it; every other operation peaks < 60 MiB/h. Its 3-sigma band ~= 1.3 GiB/h,
#     so only genuine spikes fire.
#   - Cascade: `scraper GET /scraper/stream` duration is bimodal — p50 154 ms
#     (warm cache) vs an 8 s ceiling (the cold-path playability gate budget);
#     max observed = 8001 ms. So >12 s = a genuine MULTI-provider cascade (zero
#     today). Counting >=3 such resolutions in 1 h is robust to the low volume
#     (~150 streams/day) and to one-off outliers.

groups:
  - orgId: 1
    name: Anomaly Alerts
    folder: Alerts
    interval: 5m
    rules:
      # --------------------------------------------------------------------
      # EgressVolumeAnomaly (warning) — last complete hour > baseline + 3-sigma
      # --------------------------------------------------------------------
      # Returns the COUNT of egress operations whose just-completed hour exceeds
      # baseline_avg + 3*baseline_sd over a trailing 168 h window AND clears a
      # 500 MiB/h absolute floor (the anti-flap guard, modelled on the AUTO-487 /
      # P95-traffic-gate lessons). Fires when count > 0.
      - uid: egress-volume-anomaly
        title: EgressVolumeAnomaly
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value FROM (
                  WITH hourly AS (
                    SELECT operation, toStartOfHour(timestamp) AS h, sum(bytes_out + bytes_in) AS b
                    FROM analytics.events
                    WHERE timestamp >= now() - INTERVAL 168 HOUR
                      AND effect_kind = 'egress' AND source = 'be'
                    GROUP BY operation, h),
                  stats AS (
                    SELECT operation,
                      avgIf(b,       h <  toStartOfHour(now()))                   AS baseline_avg,
                      stddevPopIf(b, h <  toStartOfHour(now()))                   AS baseline_sd,
                      anyIf(b,       h =  toStartOfHour(now() - INTERVAL 1 HOUR)) AS last_hour
                    FROM hourly GROUP BY operation)
                  SELECT operation FROM stats
                  WHERE baseline_avg > 0
                    AND last_hour > baseline_avg + 3 * baseline_sd
                    AND last_hour > 524288000)
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: streaming
          reason: egress_anomaly
        annotations:
          summary: 'Egress volume anomaly: {{ $values.B }} operation(s) over hourly baseline (>3σ, >500 MiB/h)'
          description: 'One or more egress operations sent abnormally high volume in the last complete hour (> baseline_avg + 3·σ over the trailing 168h, and > 500 MiB/h). Almost always the video HLS proxy. Open the "Activity Register" dashboard (Awareness Overview section) to see which operation and the volume vs baseline.'
          reason: egress_anomaly

      # --------------------------------------------------------------------
      # ScraperStreamCascadeLatency (warning) — >=3 stream resolves >12 s in 1 h
      # --------------------------------------------------------------------
      # Counts `scraper GET /scraper/stream` resolutions whose duration_ms exceeds
      # 12 s (1.5x the 8 s single-provider gate budget => a genuine multi-provider
      # failover cascade) in the trailing 1 h. Fires when >= 3 (threshold gt 2),
      # robust to low volume + single outliers.
      - uid: scraper-stream-cascade-latency
        title: ScraperStreamCascadeLatency
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM analytics.events
                WHERE operation = 'scraper GET /scraper/stream'
                  AND timestamp >= now() - INTERVAL 1 HOUR
                  AND duration_ms > 12000
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: scraper
          reason: stream_cascade_latency
        annotations:
          summary: 'Scraper stream cascade: {{ $values.B }} resolutions over 12s in the last hour'
          description: 'At least 3 `scraper GET /scraper/stream` resolutions exceeded 12 s in the last hour — a multi-provider failover cascade (normal is sub-second warm / 8 s single-gate). Check provider health (/api/anime/_/scraper/health), the Scraper dashboards, and recent parser_fallback_total.'
          reason: stream_cascade_latency

      # --------------------------------------------------------------------
      # AePlayerPlaybackFailures (warning) — >1 terminal aePlayer failure in 1 h
      # --------------------------------------------------------------------
      # Counts analytics.events rows with effect_kind = 'player_failed' (aePlayer
      # telemetry: all providers exhausted, or the first-party `ae` source
      # failed) in the trailing 1 h. Fires when > 1 (threshold gt 1, i.e. >= 2
      # failures), consistent with the low-volume anti-flap pattern used by
      # the cascade rule above.
      - uid: aeplayer-playback-failures
        title: AePlayerPlaybackFailures
        noDataState: OK
        execErrState: Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: aenigma-clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: aenigma-clickhouse
              queryType: sql
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM analytics.events
                WHERE effect_kind = 'player_failed'
                  AND timestamp >= now() - INTERVAL 1 HOUR
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
        for: 0s
        labels:
          severity: warning
          component: aeplayer
          reason: playback_failed
        annotations:
          summary: 'aePlayer terminal playback-failure events: {{ $values.B }} in the last hour (all-providers-exhausted or ae-source failures)'
          description: 'More than one terminal aePlayer playback failure in the last hour (all providers exhausted, or the first-party `ae` source failed). Drill down in ClickHouse: SELECT properties FROM analytics.events WHERE effect_kind = ''player_failed'' AND timestamp >= now() - INTERVAL 1 HOUR ORDER BY timestamp DESC.'
          reason: playback_failed
