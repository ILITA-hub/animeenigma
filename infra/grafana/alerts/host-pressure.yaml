apiVersion: 1

# Host-pressure alerts (graceful-degradation Phase 1,
# spec docs/superpowers/specs/2026-07-10-graceful-degradation-design.md).
#
# Two Prometheus-datasource rules over the ae:pressure_level:preview recording
# rule (docker/prometheus/rules/degradation.yml — node-exporter PSI stall ratios
# + MemAvailable floor; 0 Normal / 1 Elevated / 2 Critical). Threshold VALUES
# live in the recording rules, not here: retuning never touches Grafana
# provisioning. The `for:` durations are the Phase-1 substitute for governor
# hysteresis (the Phase-2 governor service adds enter-fast/exit-slow smoothing).
#
# Both route to the existing `maintenance-webhook` contact point; neither
# carries the provider/server/reason triple, so the maintenance bot correctly
# escalates to a plain admin notification rather than attempting an auto-fix.
#
# Source-of-truth: this file. The same two rules are appended inline into
# docker/grafana/provisioning/alerting/rules.yml (the ACTIVE provisioning
# provider copied to /etc/grafana/provisioning at boot; this directory is
# mounted to a non-provisioning path). Keep the two copies in sync.
#
# Calibration note (2026-07-10 live readings): io PSI full ~8.7% avg10 and swap
# ~91% used while memory PSI full sat at 0.17% — static-usage triggers would
# false-positive permanently on this box, which is why the level formula uses
# PSI stall ratios and why swap is context-only.

groups:
  - orgId: 1
    name: Host Pressure
    folder: Alerts
    interval: 1m
    rules:
      - uid: host-pressure-sustained
        title: HostPressureSustained
        condition: C
        noDataState: OK
        execErrState: Error
        for: 15m
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ae:pressure_level:preview
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: warning
        annotations:
          summary: "Host under sustained pressure (level >= Elevated for 15m)"
          description: "The degradation level preview has been Elevated or worse for 15 minutes. Open the Degradation Overview dashboard (/admin/grafana/d/degradation-overview) — the 'Breached signals' panel names the trigger (PSI cpu/io/mem or low MemAvailable) and the heavy-actors row shows who is eating the box."

      - uid: host-pressure-critical
        title: HostPressureCritical
        condition: C
        noDataState: OK
        execErrState: Error
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ae:pressure_level:preview
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1.5]
                    type: gt
                  operator:
                    type: and
              refId: C
              type: threshold
              expression: B
        labels:
          severity: critical
        annotations:
          summary: "Host pressure CRITICAL (level 2 for 5m)"
          description: "Critical-tier pressure thresholds breached for 5 minutes — latency-sensitive UX (playback, navigation) is likely degrading. Check the Degradation Overview dashboard (/admin/grafana/d/degradation-overview) 'Breached signals' + heavy-actors panels; consider manually pausing library jobs / Camoufox until the Phase-3 automatic actuation ships."
