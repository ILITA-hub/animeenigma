# ext.animeenigma.org — worker-facing edge vhost
#
# This vhost is the ONLY internet-facing surface that GPU workers dial.
# It sits between Cloudflare and the gateway container:
#
#   Internet → Cloudflare (orange-cloud, WAF, rate-limit rules)
#             → nginx (this file, Authenticated Origin Pulls enforced)
#             → gateway:8000 (ExternalAPIKeyMiddleware + /worker/* routes)
#             → upscaler:8096
#
# Security model:
#   1. Cloudflare orange-cloud: CF terminates TLS from the internet.
#   2. Authenticated Origin Pulls (AOP / mTLS-to-origin): CF presents its
#      origin CA cert on every request; nginx verifies it. The origin must
#      hard-refuse any request that does NOT carry the CF origin cert — this
#      prevents bypass by direct-dial to the origin IP.
#   3. EXTERNAL_API_KEY (coarse defense-in-depth): gateway-side static key
#      checked by ExternalAPIKeyMiddleware on all /worker/* requests.
#   4. Per-worker session auth: enroll→session→capability chain (Tasks 5/10).
#   5. Phase 2 (CD-9): CF mTLS — per-operator client certs for per-worker
#      identity + revocation. API-key-only for Phase 1 by owner decision.
#
# Upload cap: segment files can be large. client_max_body_size is set to
# a generous limit (512MB) to accommodate full video segment uploads.
# This is an intentional tradeoff — segment upload is admin-controlled;
# raise or lower per CD-12 presigned-direct design if OOM becomes a concern.

# Map for WebSocket connection upgrade (mirrors the main animeenigma.org config).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ext.animeenigma.org;

    # -------------------------------------------------------------------------
    # TLS (Cloudflare Full (Strict) mode — cert is CF-to-origin)
    # -------------------------------------------------------------------------
    # Replace these paths with your actual certificate and key paths.
    # For Let's Encrypt: /etc/letsencrypt/live/ext.animeenigma.org/fullchain.pem
    # For CF origin cert:  /etc/nginx/certs/ext.animeenigma.org.pem
    ssl_certificate     /etc/nginx/certs/ext.animeenigma.org.pem;
    ssl_certificate_key /etc/nginx/certs/ext.animeenigma.org.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -------------------------------------------------------------------------
    # Authenticated Origin Pulls (Cloudflare AOP)
    # MANDATORY: refuse any request that does NOT carry the CF client cert.
    # Without this a worker or attacker that knows the origin IP can bypass
    # Cloudflare entirely (including WAF, rate-limit, and DDoS protection).
    # -------------------------------------------------------------------------
    # ssl_client_certificate /etc/nginx/certs/cloudflare-origin-ca.pem;
    # ssl_verify_client      on;
    #
    # ^ Uncomment once the CF origin CA cert is provisioned.
    # Download: https://developers.cloudflare.com/ssl/origin-configuration/authenticated-origin-pull/

    # -------------------------------------------------------------------------
    # Upload cap and timeouts
    # -------------------------------------------------------------------------
    # Segment files can be hundreds of MB. 512MB cap prevents accidental
    # runaway uploads; raise per operator agreement if needed.
    client_max_body_size 512m;

    # Long timeouts for large segment uploads and WS connections.
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    # -------------------------------------------------------------------------
    # Worker routes — the ONLY routes exposed on this vhost.
    # All other paths return 404 (no fallthrough to the main app).
    # -------------------------------------------------------------------------
    location /worker/ {
        proxy_pass http://gateway:8000;

        # Stream segment bytes without buffering them in nginx memory.
        # Without these directives nginx would buffer the entire segment body
        # before forwarding — OOM risk for large uploads (CD-12 concern).
        proxy_request_buffering off;
        proxy_buffering         off;

        # Preserve the real client IP so gateway's per-IP rate limiter and
        # logs see the actual worker IP (not the CF/nginx hop).
        proxy_set_header X-Real-IP $remote_addr;

        # HTTP/1.1 required for WebSocket upgrades (/worker/ws) and
        # keep-alive connections (reduces TCP handshake overhead for segments).
        proxy_http_version 1.1;

        # WebSocket upgrade headers. These are safe to set on non-WS requests
        # too — the gateway ignores them for HTTP paths.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers.
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Default: refuse everything else.
    # This vhost serves ONLY /worker/*. Any other path (including root)
    # returns 404 — no fallthrough to the main application or any other
    # service. This limits the attack surface if a new route is accidentally
    # added to the gateway root.
    # -------------------------------------------------------------------------
    location / {
        return 404;
    }
}

# HTTP → HTTPS redirect for the ext subdomain.
server {
    listen 80;
    listen [::]:80;
    server_name ext.animeenigma.org;
    return 301 https://$host$request_uri;
}
