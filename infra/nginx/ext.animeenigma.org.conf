# ext.animeenigma.org — worker-facing edge vhost.
#
# The ONLY internet-facing surface GPU workers dial to enroll, receive work, and
# push upscaled segments back. Trust chain:
#
#   GPU worker (external)
#     → Cloudflare (orange-cloud, WAF, rate-limit rules)
#       → nginx (this vhost: CF-IP lockdown + Authenticated Origin Pulls)
#         → gateway :8000 (ExternalAPIKeyMiddleware + /worker/* routes)
#           → upscaler :8096 (/worker/enroll, /worker/ws, /worker/segments/*)
#
# This file mirrors the LIVE host deployment (see docs/upscaler-edge-setup.md).
# It is a reference: nginx host configs live on the box, not in git.
#
# Security layers (deepest first):
#   1. CF orange-cloud terminates TLS from the internet; WAF + rate-limit.
#   2. CF-IP allowlist (this file): only Cloudflare edge IPs may connect to the
#      origin, so an attacker who learns the origin IP cannot direct-dial past CF.
#   3. Authenticated Origin Pulls (mTLS-to-origin): CF presents its origin-pull
#      client cert; nginx verifies it. Cryptographic equivalent of layer 2.
#   4. EXTERNAL_API_KEY: coarse static gate on every /worker/* request (gateway).
#   5. Per-worker session auth: enroll → session → idx-bound capability handle.

# WebSocket connection-upgrade map. REQUIRED by /worker/ws. Leave COMMENTED if
# $connection_upgrade is already defined globally by another vhost (defining it
# twice fails `nginx -t` with "duplicate map ... $connection_upgrade"). On the
# live host another vhost already defines it, so it stays commented there.
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ext.animeenigma.org;

    # -------------------------------------------------------------------------
    # TLS — cert nginx presents to Cloudflare (CF "Full (Strict)" validates it).
    # Live host uses a Let's Encrypt cert issued THROUGH Cloudflare via:
    #   certbot certonly --webroot -w /var/www/ext-acme -d ext.animeenigma.org
    # (the :80 ACME location below makes the HTTP-01 challenge reachable under
    # orange-cloud). Auto-renews via the certbot timer. A Cloudflare Origin CA
    # cert (/etc/nginx/certs/ext.animeenigma.org.pem) is an equally valid choice.
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/ext.animeenigma.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ext.animeenigma.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -------------------------------------------------------------------------
    # Cloudflare origin lockdown (ACTIVE) — only CF edge IPs may connect.
    # Generate the snippet (re-pull periodically; CF ranges change rarely):
    #   { awk 'NF{print "allow "$1";"}' <(curl -s https://www.cloudflare.com/ips-v4) \
    #         <(curl -s https://www.cloudflare.com/ips-v6); echo "deny all;"; } \
    #     > /etc/nginx/snippets/cloudflare-allow.conf
    # NOTE: a `location { return ... }` resolves in the REWRITE phase, BEFORE the
    # ACCESS phase, so allow/deny never fires there — pin the allowlist inside the
    # content-phase /worker/ location (below) to actually enforce it.
    include /etc/nginx/snippets/cloudflare-allow.conf;

    # -------------------------------------------------------------------------
    # Authenticated Origin Pulls (cryptographic CF lockdown) — enable AFTER
    # toggling CF dashboard → SSL/TLS → Origin Server → "Authenticated Origin
    # Pulls" = ON (zone-level). Until CF presents the cert, enforcing here 400s
    # every request. Install the CA first:
    #   curl -fsSL https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem \
    #     -o /etc/nginx/certs/cloudflare-origin-ca.pem
    # Then uncomment + reload:
    # -------------------------------------------------------------------------
    # ssl_client_certificate /etc/nginx/certs/cloudflare-origin-ca.pem;
    # ssl_verify_client      on;

    # Segment uploads can be hundreds of MB.
    client_max_body_size 512m;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # Worker routes — the ONLY routes exposed on this vhost.
    location /worker/ {
        # Proxy target: a HOST nginx (not on the Docker network) uses the
        # gateway's loopback-published port. A CONTAINERIZED nginx on the Docker
        # network would instead use http://gateway:8000.
        proxy_pass http://127.0.0.1:8000;

        # Enforce the CF-IP allowlist on the sensitive path (see access-phase
        # note above — a server-level include does not cover return-locations,
        # and repeating it here makes the guarantee explicit for /worker/).
        include /etc/nginx/snippets/cloudflare-allow.conf;

        # Stream segment bytes; never buffer the whole body in nginx (OOM guard).
        proxy_request_buffering off;
        proxy_buffering         off;

        # Preserve client IP for the gateway's per-IP limiter / logs (it trusts
        # ONLY X-Real-IP — X-Forwarded-For is client-spoofable). Behind CF this
        # is the CF edge IP; upgrade to CF-Connecting-IP post-AOP if per-worker
        # granularity is needed.
        proxy_set_header X-Real-IP $remote_addr;

        # HTTP/1.1 + upgrade headers for the /worker/ws WebSocket.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else 404s — no fallthrough to the main app.
    location / { return 404; }
}

# HTTP :80 — serve the ACME challenge (for certbot renewals through CF) + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name ext.animeenigma.org;

    location /.well-known/acme-challenge/ {
        root /var/www/ext-acme;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}
