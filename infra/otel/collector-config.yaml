# OTLP in (from services) → tail sampling → traces fan-out (Tempo + ClickHouse + connectors).
# Tail sampling keeps 100% of error and slow (>1s) traces and ~20% of the rest,
# so the trace stores stay small while every interesting trace is retained.
#
# Phase 6 (06-01) — GATED CUTOVER FRONT HALF (purely additive, nothing removed):
#   - traces now dual-export to ClickHouse (analytics.otel_traces) AND still to Tempo
#   - container logs ship to ClickHouse (analytics.otel_logs) via the filelog receiver
#     (replaces Promtail→Loki, which STAYS RUNNING during the gate)
#   - span-metrics + service-graph metrics are regenerated by the OTel connectors and
#     remote-written to Prometheus (independent of Tempo's metrics_generator, which also
#     keeps co-emitting during the gate — distinguishable via external_labels source).
# Tempo/Loki/Promtail removal happens in 06-03, NOT here.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Docker json-file logs (mirrors Promtail's source; host dir mounted ro in compose).
  # The json-file driver wraps each line as {"log":..,"stream":..,"time":..}; the
  # json_parser + move(attributes.log -> body) unwraps the envelope so Body is the
  # raw message, not the JSON wrapper (RESEARCH Pitfall 2). start_at: end avoids
  # replaying the entire historical log backlog on first start.
  filelog:
    include: [ /var/lib/docker/containers/*/*-json.log ]
    start_at: end
    operators:
      - type: json_parser
        # The docker json-file driver writes RFC3339Nano in the "time" field. Parse it
        # into the record timestamp — WITHOUT this, Timestamp defaults to epoch 0
        # (1970), and the exporter's 168h TTL on toDateTime(Timestamp) instantly
        # expires every row (total_rows climbs but count()=0). [Rule 1 bug, caught live]
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%fZ'
      - type: move
        from: attributes.log
        to: body

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: slow
        type: latency
        latency:
          threshold_ms: 1000
      - name: sample-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 20
  batch:
    timeout: 5s
    send_batch_size: 1024

# Connectors regenerate the RED span-metrics + service-graph metrics off the trace
# stream (replacing Tempo's metrics_generator at cutover). They consume the traces
# pipeline and produce a metrics pipeline.
connectors:
  spanmetrics:
    # The OTel spanmetrics connector ALWAYS emits service.name + span.name as
    # built-in dimensions (listing them here is a "duplicate dimension" config
    # error, unlike Tempo's processor which needs them spelled out). Only the
    # EXTRA Phase-3 per-operation RED dimension goes here (mirrors tempo.yaml:59).
    dimensions:
      - name: operation
  servicegraph:
    dimensions: [service.name]

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Two named ClickHouse exporter instances so traces (14d) and logs (7d) can carry
  # distinct TTLs (RESEARCH Pitfall 3 — a single exporter has one ttl for all signals).
  # ${env:VAR} is the collector's own env-var syntax; the CH creds are injected into
  # the otel-collector container env in docker-compose.yml.
  clickhouse/traces:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: analytics
    username: ${env:CLICKHOUSE_USER}
    password: ${env:CLICKHOUSE_PASSWORD}
    create_schema: true
    traces_table_name: otel_traces
    ttl: 336h
  clickhouse/logs:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: analytics
    username: ${env:CLICKHOUSE_USER}
    password: ${env:CLICKHOUSE_PASSWORD}
    create_schema: true
    logs_table_name: otel_logs
    ttl: 168h
  # Span-metrics + service-graph sink. MUST carry the /prometheus route-prefix —
  # Prometheus runs --web.route-prefix=/prometheus (RESEARCH Pitfall 4). external_labels
  # source:otelcol distinguishes these series from Tempo's source:tempo during the gate.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/prometheus/api/v1/write
    external_labels:
      source: otelcol

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      # Tempo STAYS in the list during the gate (06-03 removes it). The connectors
      # (spanmetrics/servicegraph) act as trace consumers here.
      exporters: [otlp/tempo, clickhouse/traces, spanmetrics, servicegraph]
    logs:
      receivers: [filelog]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/logs]
    metrics/spanmetrics:
      receivers: [spanmetrics, servicegraph]
      exporters: [prometheusremotewrite]
  telemetry:
    logs:
      level: warn
