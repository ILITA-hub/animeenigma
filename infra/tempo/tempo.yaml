# Single-binary Tempo. Traces are stored in the existing MinIO (S3-compatible);
# only the small write-ahead log lives on a local volume. Retention ~14 days —
# traces are debugging data, not long-term analytics.
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h # 14 days

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      endpoint: minio:9000
      access_key: minioadmin
      secret_key: minioadmin
      insecure: true        # MinIO is plain HTTP on the internal network
      forcepathstyle: true  # required for MinIO
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Span-metrics + service-graphs generator (AR-EFFECT-04, D-12). Config-only — no
# per-span application code. Generates per-operation RED metrics + a service
# graph and remote-writes them to Prometheus. The remote_write URL carries the
# Prometheus `/prometheus` route-prefix (see docker-compose --web.route-prefix)
# and Prometheus runs with --web.enable-remote-write-receiver to accept the push.
# Phase 6 (D-14) later retires Tempo and regenerates these RED metrics via the
# OTel Collector spanmetrics connector — do NOT pre-empt that here.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/prometheus/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    span_metrics:
      dimensions: [service.name, span.name, operation]   # 'operation' surfaces the per-op RED metric
    service_graphs:
      dimensions: [service.name]

# Per-tenant enable — REQUIRED or the generator silently no-ops (RESEARCH Pitfall 6).
# Single-binary Tempo uses the overrides.defaults block.
overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics, service-graphs]

usage_report:
  reporting_enabled: false
